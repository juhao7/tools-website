<!-- tools/json-formatter.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON格式化器 - 实用工具箱</title>
    <link rel="stylesheet" href="../css/base.css">
    <style>
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .editor-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }
        
        .editor-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        
        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }
        
        textarea:focus {
            border-color: var(--accent);
        }
        
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        
        .action-btn.primary {
            background: var(--accent);
            border-color: transparent;
            color: white;
        }
        
        .action-btn.primary:hover {
            box-shadow: 0 4px 15px rgba(124, 92, 255, 0.4);
        }
        
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .option-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .option-group label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .option-group select,
        .option-group input[type="number"] {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .error-message {
            color: var(--danger);
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        
        .success-message {
            color: var(--success);
            padding: 10px;
            background: rgba(102, 187, 106, 0.1);
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        
        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
            
            .toolbar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 JSON格式化器</h1>
            <button class="tool-btn" onclick="toggleTheme()">🌙</button>
        </div>
        
        <div class="options">
            <div class="option-group">
                <label>缩进空格：</label>
                <select id="indentSelect">
                    <option value="2">2个空格</option>
                    <option value="4">4个空格</option>
                    <option value="tab">制表符</option>
                </select>
            </div>
            
            <div class="option-group">
                <label>最大深度：</label>
                <input type="number" id="maxDepth" value="10" min="1" max="50">
            </div>
        </div>
        
        <div class="toolbar">
            <button class="action-btn primary" onclick="formatJSON()">格式化</button>
            <button class="action-btn" onclick="compressJSON()">压缩</button>
            <button class="action-btn" onclick="validateJSON()">验证</button>
            <button class="action-btn" onclick="copyToClipboard()">复制结果</button>
            <button class="action-btn" onclick="clearAll()">清空</button>
            <button class="action-btn" onclick="loadSample()">加载示例</button>
        </div>
        
        <div class="editor-container">
            <div class="editor-box">
                <div class="editor-title">
                    <span>输入JSON</span>
                    <span id="inputCount" style="font-size: 12px; color: var(--text-muted);">0 字符</span>
                </div>
                <textarea id="inputEditor" placeholder="在此输入或粘贴JSON数据..."></textarea>
                <div class="error-message" id="inputError"></div>
            </div>
            
            <div class="editor-box">
                <div class="editor-title">
                    <span>格式化结果</span>
                    <span id="outputCount" style="font-size: 12px; color: var(--text-muted);">0 字符</span>
                </div>
                <textarea id="outputEditor" readonly placeholder="格式化结果将显示在这里..."></textarea>
                <div class="success-message" id="successMessage"></div>
            </div>
        </div>
    </div>
    
    <script>
        const inputEditor = document.getElementById('inputEditor');
        const outputEditor = document.getElementById('outputEditor');
        const inputError = document.getElementById('inputError');
        const successMessage = document.getElementById('successMessage');
        const inputCount = document.getElementById('inputCount');
        const outputCount = document.getElementById('outputCount');
        
        // 监听输入变化
        inputEditor.addEventListener('input', function() {
            inputCount.textContent = this.value.length + ' 字符';
        });
        
        // 格式化JSON
        function formatJSON() {
            const input = inputEditor.value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }
            
            try {
                const indentOption = document.getElementById('indentSelect').value;
                const indent = indentOption === 'tab' ? '\t' : parseInt(indentOption);
                const maxDepth = parseInt(document.getElementById('maxDepth').value);
                
                const obj = JSON.parse(input);
                const formatted = JSON.stringify(obj, null, indent);
                
                outputEditor.value = formatted;
                outputCount.textContent = formatted.length + ' 字符';
                showSuccess('JSON格式化成功！');
            } catch (error) {
                showError('JSON解析错误: ' + error.message);
            }
        }
        
        // 压缩JSON
        function compressJSON() {
            const input = inputEditor.value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }
            
            try {
                const obj = JSON.parse(input);
                const compressed = JSON.stringify(obj);
                
                outputEditor.value = compressed;
                outputCount.textContent = compressed.length + ' 字符';
                showSuccess('JSON压缩成功！');
            } catch (error) {
                showError('JSON解析错误: ' + error.message);
            }
        }
        
        // 验证JSON
        function validateJSON() {
            const input = inputEditor.value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }
            
            try {
                JSON.parse(input);
                showSuccess('JSON格式有效！');
                inputError.style.display = 'none';
            } catch (error) {
                showError('JSON格式无效: ' + error.message);
            }
        }
        
        // 复制到剪贴板
        function copyToClipboard() {
            const output = outputEditor.value;
            if (!output) {
                showError('没有可复制的内容');
                return;
            }
            
            navigator.clipboard.writeText(output).then(() => {
                showSuccess('已复制到剪贴板！');
            }).catch(err => {
                showError('复制失败: ' + err.message);
            });
        }
        
        // 清空所有
        function clearAll() {
            inputEditor.value = '';
            outputEditor.value = '';
            inputError.style.display = 'none';
            successMessage.style.display = 'none';
            inputCount.textContent = '0 字符';
            outputCount.textContent = '0 字符';
        }
        
        // 加载示例
        function loadSample() {
            const sample = {
                "name": "实用工具箱",
                "version": "1.0.0",
                "features": [
                    "JSON格式化",
                    "字数统计",
                    "颜色转换",
                    "密码生成",
                    "二维码生成"
                ],
                "author": {
                    "name": "开发者",
                    "email": "dev@example.com"
                },
                "isAwesome": true,
                "created": new Date().toISOString()
            };
            
            inputEditor.value = JSON.stringify(sample, null, 2);
            inputCount.textContent = inputEditor.value.length + ' 字符';
        }
        
        // 显示错误信息
        function showError(message) {
            inputError.textContent = message;
            inputError.style.display = 'block';
            successMessage.style.display = 'none';
        }
        
        // 显示成功信息
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            inputError.style.display = 'none';
            
            // 3秒后自动隐藏成功信息
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }
        
        // 主题切换
        let isDark = true;
        
        function setTheme(light) {
            isDark = !light;
            document.documentElement.classList.toggle('light', light);
            document.querySelector('.tool-btn').textContent = light ? '☀️' : '🌙';
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }
        
        function toggleTheme() {
            setTheme(isDark);
        }
        
        // 初始化主题
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') setTheme(true);
    </script>
</body>
</html>

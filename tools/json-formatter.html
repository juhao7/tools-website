<!-- tools/json-formatter.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON格式化器 - 实用工具箱</title>
    <link rel="stylesheet" href="../css/base.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: rgba(255,255,255,0.05);
            --bg-card: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.1);
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --accent: #7c5cff;
            --accent-light: rgba(124, 92, 255, 0.2);
            --success: #66bb6a;
            --warning: #ffa726;
            --danger: #ff6b6b;
        }

        :root.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: rgba(0,0,0,0.04);
            --bg-card: rgba(255,255,255,0.95);
            --border: rgba(0,0,0,0.08);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(0,0,0,0.65);
            --text-muted: rgba(0,0,0,0.35);
            --accent: #6c4cff;
            --accent-light: rgba(108, 76, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 20px;
            transition: background 0.3s;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        
        /* 时钟区域 */
        .clock-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .clock-time {
            font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 4px;
        }
        
        .clock-date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .tool-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .tool-btn:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        
        /* 选项区域 */
        .options-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .options-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .options-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .option-item label {
            color: var(--text-secondary);
            font-size: 14px;
            white-space: nowrap;
        }
        
        .option-item select,
        .option-item input[type="number"] {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .option-item select:focus,
        .option-item input[type="number"]:focus {
            border-color: var(--accent);
        }
        
        /* 操作按钮 */
        .actions-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .action-btn {
            padding: 14px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn:hover {
            border-color: var(--accent);
            background: var(--accent-light);
            transform: translateY(-1px);
        }
        
        .action-btn.primary {
            background: var(--accent);
            border-color: transparent;
            color: white;
        }
        
        .action-btn.primary:hover {
            box-shadow: 0 4px 15px rgba(124, 92, 255, 0.4);
        }
        
        .action-btn.success {
            background: var(--success);
            border-color: transparent;
            color: white;
        }
        
        .action-btn.warning {
            background: var(--warning);
            border-color: transparent;
            color: white;
        }
        
        .action-btn.danger {
            background: var(--danger);
            border-color: transparent;
            color: white;
        }
        
        /* 编辑器容器 */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .editor-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .editor-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .editor-info {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 15px;
        }
        
        textarea {
            flex: 1;
            min-height: 350px;
            padding: 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        
        textarea:focus {
            border-color: var(--accent);
        }
        
        textarea::placeholder {
            color: var(--text-muted);
        }
        
        /* 消息提示 */
        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 12px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        
        .message.error {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        
        .message.success {
            background: rgba(102, 187, 106, 0.15);
            color: var(--success);
            border: 1px solid rgba(102, 187, 106, 0.3);
        }
        
        /* 文件操作 */
        .file-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .file-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .file-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .file-btn {
            padding: 10px 16px;
            border: 1px dashed var(--border);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .file-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }
        
        .file-btn input[type="file"] {
            display: none;
        }
        
        /* 统计信息 */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            font-family: "SF Mono", monospace;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .clock-time {
                font-size: 2rem;
            }
            
            .header h1 {
                font-size: 1.4rem;
            }
            
            .editor-container {
                grid-template-columns: 1fr;
            }
            
            .actions-section {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .file-actions {
                flex-direction: column;
            }
            
            .file-btn {
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .clock-time {
                font-size: 1.8rem;
            }
            
            .actions-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 时钟区域 -->
        <div class="clock-section">
            <div class="clock-time" id="clock">00:00:00</div>
            <div class="clock-date" id="clockDate"></div>
        </div>
        
        <!-- 头部 -->
        <div class="header">
            <h1>📋 JSON格式化器</h1>
            <div class="header-actions">
                <button class="tool-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
                <a href="../index.html" class="tool-btn" title="返回首页">🏠</a>
            </div>
        </div>
        
        <!-- 选项设置 -->
        <div class="options-section">
            <div class="options-header">
                <div class="options-title">⚙️ 格式选项</div>
            </div>
            <div class="options-grid">
                <div class="option-item">
                    <label>缩进空格：</label>
                    <select id="indentSelect">
                        <option value="2">2个空格</option>
                        <option value="4">4个空格</option>
                        <option value="tab">制表符</option>
                    </select>
                </div>
                <div class="option-item">
                    <label>最大深度：</label>
                    <input type="number" id="maxDepth" value="10" min="1" max="50">
                </div>
                <div class="option-item">
                    <label>排序键名：</label>
                    <select id="sortKeys">
                        <option value="no">不排序</option>
                        <option value="asc">升序 A-Z</option>
                        <option value="desc">降序 Z-A</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="actions-section">
            <button class="action-btn primary" onclick="formatJSON()">✨ 格式化</button>
            <button class="action-btn" onclick="compressJSON()">📦 压缩</button>
            <button class="action-btn" onclick="validateJSON()">✅ 验证</button>
            <button class="action-btn" onclick="copyToClipboard()">📋 复制结果</button>
            <button class="action-btn" onclick="swapEditors()">🔄 交换</button>
            <button class="action-btn" onclick="loadSample()">📝 示例</button>
            <button class="action-btn danger" onclick="clearAll()">🗑️ 清空</button>
        </div>
        
        <!-- 文件操作 -->
        <div class="file-section">
            <div class="file-header">
                <div class="file-title">📁 文件操作</div>
            </div>
            <div class="file-actions">
                <label class="file-btn">
                    📤 上传JSON文件
                    <input type="file" id="fileInput" accept=".json,.txt" onchange="uploadFile(this)">
                </label>
                <button class="file-btn" onclick="downloadJSON('formatted')">📥 下载格式化结果</button>
                <button class="file-btn" onclick="downloadJSON('compressed')">📥 下载压缩结果</button>
            </div>
        </div>
        
        <!-- 统计信息 -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-value" id="inputChars">0</div>
                <div class="stat-label">输入字符</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="inputLines">0</div>
                <div class="stat-label">输入行数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="outputChars">0</div>
                <div class="stat-label">输出字符</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="outputLines">0</div>
                <div class="stat-label">输出行数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="compressRate">0%</div>
                <div class="stat-label">压缩率</div>
            </div>
        </div>
        
        <!-- 编辑器 -->
        <div class="editor-container">
            <div class="editor-box">
                <div class="editor-header">
                    <div class="editor-title">📥 输入JSON</div>
                    <div class="editor-info">
                        <span id="inputCount">0 字符</span>
                    </div>
                </div>
                <textarea id="inputEditor" placeholder="在此输入或粘贴JSON数据，也可以上传文件..." oninput="updateStats()"></textarea>
                <div class="message error" id="inputError"></div>
            </div>
            
            <div class="editor-box">
                <div class="editor-header">
                    <div class="editor-title">📤 格式化结果</div>
                    <div class="editor-info">
                        <span id="outputCount">0 字符</span>
                    </div>
                </div>
                <textarea id="outputEditor" readonly placeholder="格式化结果将显示在这里..."></textarea>
                <div class="message success" id="successMessage"></div>
            </div>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>© 2024 实用工具箱 - JSON格式化器</p>
            <p style="margin-top: 5px;">快捷键: Ctrl+Shift+T 切换主题 | Ctrl+Enter 格式化</p>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script>
        const inputEditor = document.getElementById('inputEditor');
        const outputEditor = document.getElementById('outputEditor');
        const inputError = document.getElementById('inputError');
        const successMessage = document.getElementById('successMessage');
        
        // 时钟功能
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const y = now.getFullYear();
            const mo = now.getMonth() + 1;
            const d = now.getDate();
            document.getElementById('clockDate').textContent = `${y}年${mo}月${d}日 ${weekDays[now.getDay()]}`;
        }
        
        // 更新统计信息
        function updateStats() {
            const input = inputEditor.value;
            const output = outputEditor.value;
            
            document.getElementById('inputChars').textContent = input.length;
            document.getElementById('inputLines').textContent = input ? input.split('\n').length : 0;
            document.getElementById('inputCount').textContent = input.length + ' 字符';
            
            document.getElementById('outputChars').textContent = output.length;
            document.getElementById('outputLines').textContent = output ? output.split('\n').length : 0;
            document.getElementById('outputCount').textContent = output.length + ' 字符';
            
            // 计算压缩率
            if (input.length > 0 && output.length > 0) {
                const rate = Math.round((1 - output.length / input.length) * 100);
                document.getElementById('compressRate').textContent = rate + '%';
            } else {
                document.getElementById('compressRate').textContent = '0%';
            }
        }
        
        // 格式化JSON
        function formatJSON() {
            const input = inputEditor.value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }
            
            try {
                const indentOption = document.getElementById('indentSelect').value;
                const indent = indentOption === 'tab' ? '\t' : parseInt(indentOption);
                const sortOption = document.getElementById('sortKeys').value;
                
                let obj = JSON.parse(input);
                
                // 排序键名
                if (sortOption !== 'no') {
                    obj = sortObjectKeys(obj, sortOption === 'asc');
                }
                
                const formatted = JSON.stringify(obj, null, indent);
                
                outputEditor.value = formatted;
                updateStats();
                showSuccess('JSON格式化成功！');
                showToast('✅ 格式化完成');
            } catch (error) {
                showError('JSON解析错误: ' + error.message);
            }
        }
        
        // 递归排序对象键名
        function sortObjectKeys(obj, ascending) {
            if (typeof obj !== 'object' || obj === null) return obj;
            
            if (Array.isArray(obj)) {
                return obj.map(item => sortObjectKeys(item, ascending));
            }
            
            const sortedKeys = Object.keys(obj).sort((a, b) => {
                return ascending ? a.localeCompare(b) : b.localeCompare(a);
            });
            
            const sorted = {};
            sortedKeys.forEach(key => {
                sorted[key] = sortObjectKeys(obj[key], ascending);
            });
            
            return sorted;
        }
        
        // 压缩JSON
        function compressJSON() {
            const input = inputEditor.value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }
            
            try {
                const obj = JSON.parse(input);
                const compressed = JSON.stringify(obj);
                
                outputEditor.value = compressed;
                updateStats();
                showSuccess('JSON压缩成功！');
                showToast('✅ 压缩完成');
            } catch (error) {
                showError('JSON解析错误: ' + error.message);
            }
        }
        
        // 验证JSON
        function validateJSON() {
            const input = inputEditor.value.trim();
            if (!input) {
                showError('请输入JSON数据');
                return;
            }
            
            try {
                const obj = JSON.parse(input);
                const keys = countKeys(obj);
                showSuccess(`JSON格式有效！包含 ${keys} 个键`);
                showToast('✅ 验证通过');
            } catch (error) {
                showError('JSON格式无效: ' + error.message);
            }
        }
        
        // 统计键数量
        function countKeys(obj) {
            if (typeof obj !== 'object' || obj === null) return 0;
            
            let count = 0;
            if (Array.isArray(obj)) {
                obj.forEach(item => count += countKeys(item));
            } else {
                count += Object.keys(obj).length;
                Object.values(obj).forEach(val => count += countKeys(val));
            }
            return count;
        }
        
        // 复制到剪贴板
        function copyToClipboard() {
            const output = outputEditor.value;
            if (!output) {
                showError('没有可复制的内容');
                return;
            }
            
            navigator.clipboard.writeText(output).then(() => {
                showSuccess('已复制到剪贴板！');
                showToast('📋 已复制');
            }).catch(err => {
                // 备用方案
                outputEditor.select();
                document.execCommand('copy');
                showSuccess('已复制到剪贴板！');
                showToast('📋 已复制');
            });
        }
        
        // 交换输入输出
        function swapEditors() {
            const temp = inputEditor.value;
            inputEditor.value = outputEditor.value;
            outputEditor.value = temp;
            updateStats();
            showToast('🔄 已交换');
        }
        
        // 上传文件
        function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                inputEditor.value = e.target.result;
                updateStats();
                showSuccess(`文件 "${file.name}" 加载成功！`);
                showToast('📤 文件已加载');
            };
            reader.readAsText(file);
            
            // 重置input，允许重复上传同一文件
            input.value = '';
        }
        
        // 下载JSON
        function downloadJSON(type) {
            const content = type === 'formatted' ? outputEditor.value : 
                           JSON.stringify(JSON.parse(outputEditor.value || '{}'));
            
            if (!content) {
                showError('没有可下载的内容');
                return;
            }
            
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `json-${type}-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('📥 文件已下载');
        }
        
        // 清空所有
        function clearAll() {
            inputEditor.value = '';
            outputEditor.value = '';
            inputError.style.display = 'none';
            successMessage.style.display = 'none';
            updateStats();
            showToast('🗑️ 已清空');
        }
        
        // 加载示例
        function loadSample() {
            const sample = {
                "name": "实用工具箱",
                "version": "2.0.0",
                "description": "一个简洁实用的在线工具集合",
                "features": [
                    "JSON格式化",
                    "字数统计",
                    "颜色转换",
                    "密码生成",
                    "二维码生成",
                    "文本对比"
                ],
                "author": {
                    "name": "开发者",
                    "email": "dev@example.com",
                    "github": "https://github.com/juhao7"
                },
                "settings": {
                    "theme": "dark",
                    "language": "zh-CN",
                    "autoSave": true
                },
                "statistics": {
                    "users": 10000,
                    "tools": 15,
                    "requests": 500000
                },
                "isAwesome": true,
                "created": new Date().toISOString()
            };
            
            inputEditor.value = JSON.stringify(sample, null, 2);
            updateStats();
            showToast('📝 示例已加载');
        }
        
        // 显示错误信息
        function showError(message) {
            inputError.innerHTML = '❌ ' + message;
            inputError.style.display = 'flex';
            successMessage.style.display = 'none';
        }
        
        // 显示成功信息
        function showSuccess(message) {
            successMessage.innerHTML = '✅ ' + message;
            successMessage.style.display = 'flex';
            inputError.style.display = 'none';
            
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }
        
        // 显示提示消息
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 主题切换
        let isDark = true;
        
        function setTheme(light) {
            isDark = !light;
            document.documentElement.classList.toggle('light', light);
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) {
                themeBtn.textContent = light ? '☀️' : '🌙';
                themeBtn.title = light ? '切换到深色模式' : '切换到浅色模式';
            }
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }
        
        function toggleTheme() {
            setTheme(isDark);
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateClock();
            setInterval(updateClock, 1000);
            
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') setTheme(true);
            
            // 绑定快捷键
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'T') {
                    e.preventDefault();
                    toggleTheme();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    formatJSON();
                }
            });
            
            updateStats();
        });
    </script>
</body>
</html>

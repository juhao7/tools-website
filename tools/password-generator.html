<!-- tools/password-generator.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - 实用工具箱</title>
    <link rel="stylesheet" href="../css/base.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: rgba(255,255,255,0.05);
            --bg-card: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.1);
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --accent: #7c5cff;
            --accent-light: rgba(124, 92, 255, 0.2);
            --success: #66bb6a;
            --warning: #ffa726;
            --danger: #ff6b6b;
        }

        :root.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: rgba(0,0,0,0.04);
            --bg-card: rgba(255,255,255,0.95);
            --border: rgba(0,0,0,0.08);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(0,0,0,0.65);
            --text-muted: rgba(0,0,0,0.35);
            --accent: #6c4cff;
            --accent-light: rgba(108, 76, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            padding: 30px 16px;
            transition: background 0.3s;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* 时钟样式 */
        .clock-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .clock-time {
            font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
            font-size: 3.5rem;
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 4px;
        }

        .clock-date {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* 头部样式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header h1 span {
            background: linear-gradient(135deg, #7c5cff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toolbar {
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .tool-btn:hover { 
            transform: scale(1.05); 
        }

        /* 密码显示区域 */
        .password-display {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .password-text {
            font-family: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
            font-size: 2.5rem;
            color: var(--text-primary);
            word-break: break-all;
            margin-bottom: 20px;
            line-height: 1.4;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .password-strength {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .strength-bar {
            width: 60px;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
        }

        .strength-bar.weak { background: var(--danger); }
        .strength-bar.medium { background: var(--warning); }
        .strength-bar.strong { background: var(--success); }

        .strength-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 选项网格 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .option-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .option-group {
            margin-bottom: 15px;
        }

        .option-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .option-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .slider-container {
            margin-bottom: 15px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .slider-label {
            color: var(--text-secondary);
        }

        .slider-value {
            color: var(--accent);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        /* 生成按钮 */
        .generate-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .generate-btn {
            flex: 1;
            min-width: 120px;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .generate-btn.primary {
            background: linear-gradient(135deg, #7c5cff, #6c4cff);
            color: white;
        }

        .generate-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 92, 255, 0.4);
        }

        .generate-btn.secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .generate-btn.secondary:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        /* 批量下载区域 */
        .batch-download-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .batch-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .batch-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .batch-input {
            flex: 1;
            min-width: 100px;
        }

        .batch-input label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .batch-input input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .batch-input input:focus {
            border-color: var(--accent);
        }

        .batch-btn {
            padding: 12px 20px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 22px;
        }

        .batch-btn:hover {
            background: var(--accent);
            box-shadow: 0 4px 15px rgba(124, 92, 255, 0.4);
            transform: translateY(-2px);
        }

        /* 历史记录 */
        .history-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }

        .history-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-actions {
            display: flex;
            gap: 10px;
        }

        .history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--bg-secondary);
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .history-password {
            color: var(--text-primary);
            word-break: break-all;
            flex: 1;
            margin-right: 15px;
        }

        .history-time {
            font-size: 12px;
            color: var(--text-muted);
            margin-right: 15px;
            min-width: 80px;
        }

        .history-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .empty-history {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }

        /* 快捷操作 */
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .action-btn {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            .clock-time {
                font-size: 2.5rem;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .toolbar {
                width: 100%;
                justify-content: center;
            }

            .password-text {
                font-size: 1.8rem;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .generate-buttons {
                flex-direction: column;
            }

            .generate-btn {
                width: 100%;
            }

            .batch-controls {
                flex-direction: column;
            }

            .batch-btn {
                width: 100%;
                margin-top: 10px;
            }

            .history-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .history-time {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 时钟区域 -->
        <div class="clock-section">
            <div class="clock-time" id="clock">00:00:00</div>
            <div class="clock-date" id="clockDate"></div>
        </div>

        <!-- 头部 -->
        <div class="header">
            <h1>🔑 密码<span>生成器</span></h1>
            <div class="toolbar">
                <button class="tool-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
                <a href="../index.html" class="tool-btn" title="返回主页">🏠</a>
            </div>
        </div>

        <!-- 快捷操作 -->
        <div class="quick-actions">
            <button class="action-btn" onclick="copyCurrentPassword()">📋 复制当前密码</button>
            <button class="action-btn" onclick="copyAllHistory()">📝 复制所有历史</button>
            <button class="action-btn" onclick="downloadAllPasswords()">💾 下载所有密码</button>
            <button class="action-btn" onclick="clearInput()">🗑️ 清空当前</button>
        </div>

        <!-- 密码显示 -->
        <div class="password-display">
            <div class="password-text" id="passwordDisplay">点击生成密码</div>
            <div class="password-strength">
                <div class="strength-bar" id="strength1"></div>
                <div class="strength-bar" id="strength2"></div>
                <div class="strength-bar" id="strength3"></div>
                <div class="strength-bar" id="strength4"></div>
            </div>
            <div class="strength-text" id="strengthText">密码强度：-</div>
        </div>

        <!-- 选项网格 -->
        <div class="options-grid">
            <div class="option-card">
                <div class="option-title">字符类型</div>
                <div class="option-group">
                    <label>
                        <input type="checkbox" id="uppercase" checked>
                        大写字母 (A-Z)
                    </label>
                </div>
                <div class="option-group">
                    <label>
                        <input type="checkbox" id="lowercase" checked>
                        小写字母 (a-z)
                    </label>
                </div>
                <div class="option-group">
                    <label>
                        <input type="checkbox" id="numbers" checked>
                        数字 (0-9)
                    </label>
                </div>
                <div class="option-group">
                    <label>
                        <input type="checkbox" id="symbols">
                        特殊字符 (!@#$%^&*)
                    </label>
                </div>
            </div>
            
            <div class="option-card">
                <div class="option-title">密码设置</div>
                <div class="slider-container">
                    <div class="slider-header">
                        <span class="slider-label">密码长度</span>
                        <span class="slider-value" id="lengthValue">16</span>
                    </div>
                    <input type="range" id="passwordLength" min="4" max="64" value="16" oninput="updateLengthDisplay()">
                </div>
                <div class="option-group">
                    <label>
                        <input type="checkbox" id="excludeSimilar">
                        排除相似字符 (i, l, 1, L, o, 0, O)
                    </label>
                </div>
                <div class="option-group">
                    <label>
                        <input type="checkbox" id="excludeAmbiguous">
                        排除歧义字符 ({}, [], (), /\~,;.<>)
                    </label>
                </div>
            </div>
        </div>

        <!-- 生成按钮 -->
        <div class="generate-buttons">
            <button class="generate-btn primary" onclick="generatePassword()">⚡ 生成密码</button>
            <button class="generate-btn secondary" onclick="generateMultiple(5)">🔄 批量生成5个</button>
            <button class="generate-btn secondary" onclick="copyCurrentPassword()">📋 复制密码</button>
        </div>

        <!-- 批量下载区域 -->
        <div class="batch-download-section">
            <div class="batch-title">📥 批量下载密码</div>
            <div class="batch-controls">
                <div class="batch-input">
                    <label>生成数量</label>
                    <input type="number" id="batchCount" min="1" max="100" value="10" placeholder="1-100">
                </div>
                <div class="batch-input">
                    <label>文件格式</label>
                    <select id="fileFormat" class="batch-input" style="width: 100%; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px;">
                        <option value="txt">文本文件 (.txt)</option>
                        <option value="csv">CSV文件 (.csv)</option>
                        <option value="json">JSON文件 (.json)</option>
                    </select>
                </div>
                <button class="batch-btn" onclick="batchGenerateAndDownload()">🔄 生成并下载</button>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="history-section">
            <div class="history-title">
                <span>📜 生成历史</span>
                <div class="history-actions">
                    <button class="history-btn" onclick="copyAllHistory()">复制全部</button>
                    <button class="history-btn" onclick="downloadAllPasswords()">下载全部</button>
                    <button class="history-btn" onclick="clearHistory()">清空历史</button>
                </div>
            </div>
            <ul class="history-list" id="historyList">
                <li class="empty-history">暂无生成历史</li>
            </ul>
        </div>
    </div>
    
    <script>
        let currentPassword = '';
        let history = JSON.parse(localStorage.getItem('passwordHistory')) || [];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化时钟
            updateClock();
            setInterval(updateClock, 1000);
            
            // 初始化主题
            initTheme();
            
            // 初始化显示
            updateLengthDisplay();
            renderHistory();
            
            // 绑定键盘快捷键
            document.addEventListener('keydown', function(e) {
                // Ctrl+Enter 生成密码
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    generatePassword();
                }
                
                // Ctrl+Shift+C 复制当前密码
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
                    e.preventDefault();
                    copyCurrentPassword();
                }
            });
        });
        
        // 时钟功能
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const y = now.getFullYear();
            const mo = now.getMonth() + 1;
            const d = now.getDate();
            document.getElementById('clockDate').textContent = `${y}年${mo}月${d}日 ${weekDays[now.getDay()]}`;
        }
        
        // 主题切换功能
        let isDark = true;
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                setTheme(true);
            }
        }
        
        function setTheme(light) {
            isDark = !light;
            document.documentElement.classList.toggle('light', light);
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) {
                themeBtn.textContent = light ? '☀️' : '🌙';
                themeBtn.title = light ? '切换到深色模式' : '切换到浅色模式';
            }
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }
        
        function toggleTheme() {
            setTheme(isDark);
        }
        
        // 更新长度显示
        function updateLengthDisplay() {
            const length = document.getElementById('passwordLength').value;
            document.getElementById('lengthValue').textContent = length;
        }
        
        // 生成密码
        function generatePassword() {
            const length = parseInt(document.getElementById('passwordLength').value);
            const uppercase = document.getElementById('uppercase').checked;
            const lowercase = document.getElementById('lowercase').checked;
            const numbers = document.getElementById('numbers').checked;
            const symbols = document.getElementById('symbols').checked;
            const excludeSimilar = document.getElementById('excludeSimilar').checked;
            const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;
            
            // 检查是否至少选择了一种字符类型
            if (!uppercase && !lowercase && !numbers && !symbols) {
                alert('请至少选择一种字符类型');
                return;
            }
            
            // 定义字符集
            let chars = '';
            let similarChars = 'iIl1LoO0';
            let ambiguousChars = '{}[]()/\\~,;.<>';
            
            if (uppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (numbers) chars += '0123456789';
            if (symbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            // 排除字符
            if (excludeSimilar) {
                for (let char of similarChars) {
                    chars = chars.replace(new RegExp(char, 'g'), '');
                }
            }
            
            if (excludeAmbiguous) {
                for (let char of ambiguousChars) {
                    chars = chars.replace(new RegExp('\\' + char, 'g'), '');
                }
            }
            
            if (chars.length === 0) {
                alert('没有可用的字符，请调整选项');
                return;
            }
            
            // 生成密码
            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * chars.length);
                password += chars[randomIndex];
            }
            
            // 确保包含所有选中的字符类型
            const requiredChars = [];
            if (uppercase) requiredChars.push('ABCDEFGHIJKLMNOPQRSTUVWXYZ');
            if (lowercase) requiredChars.push('abcdefghijklmnopqrstuvwxyz');
            if (numbers) requiredChars.push('0123456789');
            if (symbols) requiredChars.push('!@#$%^&*()_+-=[]{}|;:,.<>?');
            
            // 检查是否包含所有必需的字符类型
            let isValid = true;
            for (const charSet of requiredChars) {
                let hasChar = false;
                for (let i = 0; i < length; i++) {
                    if (charSet.includes(password[i])) {
                        hasChar = true;
                        break;
                    }
                }
                if (!hasChar) {
                    isValid = false;
                    break;
                }
            }
            
            // 如果不包含所有必需的字符类型，重新生成
            if (!isValid) {
                return generatePassword();
            }
            
            currentPassword = password;
            displayPassword(password);
            addToHistory(password);
        }
        
        // 批量生成
        function generateMultiple(count) {
            const passwords = [];
            for (let i = 0; i < count; i++) {
                generatePassword();
                passwords.push(currentPassword);
            }
            
            const message = `已生成 ${count} 个密码：\n\n${passwords.join('\n')}\n\n是否复制到剪贴板？`;
            if (confirm(message)) {
                navigator.clipboard.writeText(passwords.join('\n')).then(() => {
                    alert('已复制到剪贴板！');
                }).catch(err => {
                    alert('复制失败: ' + err.message);
                });
            }
        }
        
        // 显示密码
        function displayPassword(password) {
            document.getElementById('passwordDisplay').textContent = password;
            updateStrength(password);
        }
        
        // 更新密码强度
        function updateStrength(password) {
            let strength = 0;
            const length = password.length;
            
            // 长度检查
            if (length >= 8) strength++;
            if (length >= 12) strength++;
            if (length >= 16) strength++;
            
            // 字符类型检查
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumbers = /[0-9]/.test(password);
            const hasSymbols = /[^A-Za-z0-9]/.test(password);
            
            const charTypes = [hasUpperCase, hasLowerCase, hasNumbers, hasSymbols].filter(Boolean).length;
            if (charTypes >= 2) strength++;
            if (charTypes >= 3) strength++;
            if (charTypes >= 4) strength++;
            
            // 计算最终强度
            let strengthLevel = 0;
            if (strength >= 5) strengthLevel = 4; // 非常强
            else if (strength >= 4) strengthLevel = 3; // 强
            else if (strength >= 3) strengthLevel = 2; // 中等
            else if (strength >= 2) strengthLevel = 1; // 弱
            
            // 更新强度条
            const strengthBars = ['strength1', 'strength2', 'strength3', 'strength4'];
            strengthBars.forEach((id, index) => {
                const bar = document.getElementById(id);
                bar.className = 'strength-bar';
                
                if (index < strengthLevel) {
                    if (strengthLevel <= 1) bar.classList.add('weak');
                    else if (strengthLevel <= 2) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
            
            // 更新强度文本
            const strengthTexts = ['弱', '中等', '强', '非常强'];
            document.getElementById('strengthText').textContent = 
                `密码强度：${strengthTexts[strengthLevel - 1] || '弱'}`;
        }
        
        // 复制当前密码
        function copyCurrentPassword() {
            if (!currentPassword) {
                alert('请先生成密码');
                return;
            }
            
            navigator.clipboard.writeText(currentPassword).then(() => {
                alert('密码已复制到剪贴板！');
            }).catch(err => {
                alert('复制失败: ' + err.message);
            });
        }
        
        // 复制所有历史密码
        function copyAllHistory() {
            if (history.length === 0) {
                alert('没有历史密码可复制');
                return;
            }
            
            const allPasswords = history.map(item => item.password).join('\n');
            navigator.clipboard.writeText(allPasswords).then(() => {
                alert(`已复制 ${history.length} 个密码到剪贴板！`);
            }).catch(err => {
                alert('复制失败: ' + err.message);
            });
        }
        
        // 下载所有密码
        function downloadAllPasswords() {
            if (history.length === 0) {
                alert('没有历史密码可下载');
                return;
            }
            
            const format = document.getElementById('fileFormat').value;
            let content = '';
            let filename = `passwords_${new Date().toISOString().slice(0, 10)}`;
            
            switch (format) {
                case 'txt':
                    content = history.map(item => `${item.password} (${item.time})`).join('\n');
                    filename += '.txt';
                    break;
                case 'csv':
                    content = '密码,生成时间\n' + history.map(item => `"${item.password}","${item.time}"`).join('\n');
                    filename += '.csv';
                    break;
                case 'json':
                    content = JSON.stringify(history, null, 2);
                    filename += '.json';
                    break;
            }
            
            downloadFile(content, filename, format);
        }
        
        // 批量生成并下载
        function batchGenerateAndDownload() {
            const count = parseInt(document.getElementById('batchCount').value);
            const format = document.getElementById('fileFormat').value;
            
            if (isNaN(count) || count < 1 || count > 100) {
                alert('请输入1-100之间的数量');
                return;
            }
            
            const passwords = [];
            for (let i = 0; i < count; i++) {
                generatePassword();
                passwords.push({
                    password: currentPassword,
                    time: new Date().toLocaleString()
                });
            }
            
            let content = '';
            let filename = `batch_passwords_${new Date().toISOString().slice(0, 10)}`;
            
            switch (format) {
                case 'txt':
                    content = passwords.map(item => `${item.password} (${item.time})`).join('\n');
                    filename += '.txt';
                    break;
                case 'csv':
                    content = '密码,生成时间\n' + passwords.map(item => `"${item.password}","${item.time}"`).join('\n');
                    filename += '.csv';
                    break;
                case 'json':
                    content = JSON.stringify(passwords, null, 2);
                    filename += '.json';
                    break;
            }
            
            downloadFile(content, filename, format);
            alert(`已生成 ${count} 个密码并下载！`);
        }
        
        // 下载文件
        function downloadFile(content, filename, format) {
            const blob = new Blob([content], { 
                type: format === 'json' ? 'application/json' : 
                      format === 'csv' ? 'text/csv' : 'text/plain'
            });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }
        
        // 清空当前输入
        function clearInput() {
            currentPassword = '';
            document.getElementById('passwordDisplay').textContent = '点击生成密码';
            document.getElementById('strengthText').textContent = '密码强度：-';
            
            const strengthBars = ['strength1', 'strength2', 'strength3', 'strength4'];
            strengthBars.forEach(id => {
                document.getElementById(id).className = 'strength-bar';
            });
        }
        
        // 添加到历史记录
        function addToHistory(password) {
            history.unshift({
                password: password,
                time: new Date().toLocaleString()
            });
            
            // 保留最近50条记录
            if (history.length > 50) {
                history = history.slice(0, 50);
            }
            
            localStorage.setItem('passwordHistory', JSON.stringify(history));
            renderHistory();
        }
        
        // 渲染历史记录
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            
            if (history.length === 0) {
                historyList.innerHTML = '<li class="empty-history">暂无生成历史</li>';
                return;
            }
            
            historyList.innerHTML = history.map((item, index) => `
                <li class="history-item">
                    <span class="history-password">${item.password}</span>
                    <span class="history-time">${item.time}</span>
                    <div class="history-actions">
                        <button class="history-btn" onclick="copyHistoryPassword(${index})">复制</button>
                        <button class="history-btn" onclick="removeHistoryItem(${index})">删除</button>
                    </div>
                </li>
            `).join('');
        }
        
        // 复制历史密码
        function copyHistoryPassword(index) {
            const password = history[index].password;
            navigator.clipboard.writeText(password).then(() => {
                alert('密码已复制到剪贴板！');
            }).catch(err => {
                alert('复制失败: ' + err.message);
            });
        }
        
        // 删除历史记录项
        function removeHistoryItem(index) {
            history.splice(index, 1);
            localStorage.setItem('passwordHistory', JSON.stringify(history));
            renderHistory();
        }
        
        // 清空历史记录
        function clearHistory() {
            if (confirm('确定要清空所有生成历史吗？')) {
                history = [];
                localStorage.removeItem('passwordHistory');
                renderHistory();
            }
        }
    </script>
</body>

        <div class="generate-buttons">
            <button class="generate-btn primary" onclick="generatePassword()">⚡ 生成密码</button>
            <button class="generate-btn secondary" onclick="generateMultiple(5)">🔄 批量生成5个</button>
            <button class="generate-btn secondary" onclick="copyCurrentPassword()">📋 复制密码</button>
        </div>

        <!-- 批量下载区域 -->
        <div class="batch-download-section">
            <div class="batch-title">📥 批量下载密码</div>
            <div class="batch-controls">
                <div class="batch-input">
                    <label>生成数量</label>
                    <input type="number" id="batchCount" min="1" max="100" value="10" placeholder="1-100">
                </div>
                <div class="batch-input">
                    <label>文件格式</label>
                    <select id="fileFormat" class="batch-input" style="width: 100%; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px;">
                        <option value="txt">文本文件 (.txt)</option>
                        <option value="csv">CSV文件 (.csv)</option>
                        <option value="json">JSON文件 (.json)</option>
                    </select>
                </div>
                <button class="batch-btn" onclick="batchGenerateAndDownload()">🔄 生成并下载</button>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="history-section">
            <div class="history-title">
                <span>📜 生成历史</span>
                <div class="history-actions">
                    <button class="history-btn" onclick="copyAllHistory()">复制全部</button>
                    <button class="history-btn" onclick="downloadAllPasswords()">下载全部</button>
                    <button class="history-btn" onclick="clearHistory()">清空历史</button>
                </div>
            </div>
            <ul class="history-list" id="historyList">
                <li class="empty-history">暂无生成历史</li>
            </ul>
        </div>
    </div>
    
    <script>
        let currentPassword = '';
        let history = JSON.parse(localStorage.getItem('passwordHistory')) || [];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化时钟
            updateClock();
            setInterval(updateClock, 1000);
            
            // 初始化主题
            initTheme();
            
            // 初始化显示
            updateLengthDisplay();
            renderHistory();
            
            // 绑定键盘快捷键
            document.addEventListener('keydown', function(e) {
                // Ctrl+Enter 生成密码
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    generatePassword();
                }
                
                // Ctrl+Shift+C 复制当前密码
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
                    e.preventDefault();
                    copyCurrentPassword();
                }
            });
        });
        
        // 时钟功能
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const y = now.getFullYear();
            const mo = now.getMonth() + 1;
            const d = now.getDate();
            document.getElementById('clockDate').textContent = `${y}年${mo}月${d}日 ${weekDays[now.getDay()]}`;
        }
        
        // 主题切换功能
        let isDark = true;
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                setTheme(true);
            }
        }
        
        function setTheme(light) {
            isDark = !light;
            document.documentElement.classList.toggle('light', light);
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) {
                themeBtn.textContent = light ? '☀️' : '🌙';
                themeBtn.title = light ? '切换到深色模式' : '切换到浅色模式';
            }
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }
        
        function toggleTheme() {
            setTheme(isDark);
        }
        
        // 更新长度显示
        function updateLengthDisplay() {
            const length = document.getElementById('passwordLength').value;
            document.getElementById('lengthValue').textContent = length;
        }
        
        // 生成密码
        function generatePassword() {
            const length = parseInt(document.getElementById('passwordLength').value);
            const uppercase = document.getElementById('uppercase').checked;
            const lowercase = document.getElementById('lowercase').checked;
            const numbers = document.getElementById('numbers').checked;
            const symbols = document.getElementById('symbols').checked;
            const excludeSimilar = document.getElementById('excludeSimilar').checked;
            const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;
            
            // 检查是否至少选择了一种字符类型
            if (!uppercase && !lowercase && !numbers && !symbols) {
                alert('请至少选择一种字符类型');
                return;
            }
            
            // 定义字符集
            let chars = '';
            let similarChars = 'iIl1LoO0';
            let ambiguousChars = '{}[]()/\\~,;.<>';
            
            if (uppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (numbers) chars += '0123456789';
            if (symbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            // 排除字符
            if (excludeSimilar) {
                for (let char of similarChars) {
                    chars = chars.replace(new RegExp(char, 'g'), '');
                }
            }
            
            if (excludeAmbiguous) {
                for (let char of ambiguousChars) {
                    chars = chars.replace(new RegExp('\\' + char, 'g'), '');
                }
            }
            
            if (chars.length === 0) {
                alert('没有可用的字符，请调整选项');
                return;
            }
            
            // 生成密码
            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * chars.length);
                password += chars[randomIndex];
            }
            
            // 确保包含所有选中的字符类型
            const requiredChars = [];
            if (uppercase) requiredChars.push('ABCDEFGHIJKLMNOPQRSTUVWXYZ');
            if (lowercase) requiredChars.push('abcdefghijklmnopqrstuvwxyz');
            if (numbers) requiredChars.push('0123456789');
            if (symbols) requiredChars.push('!@#$%^&*()_+-=[]{}|;:,.<>?');
            
            // 检查是否包含所有必需的字符类型
            let isValid = true;
            for (const charSet of requiredChars) {
                let hasChar = false;
                for (let i = 0; i < length; i++) {
                    if (charSet.includes(password[i])) {
                        hasChar = true;
                        break;
                    }
                }
                if (!hasChar) {
                    isValid = false;
                    break;
                }
            }
            
            // 如果不包含所有必需的字符类型，重新生成
            if (!isValid) {
                return generatePassword();
            }
            
            currentPassword = password;
            displayPassword(password);
            addToHistory(password);
        }
        
        // 批量生成
        function generateMultiple(count) {
            const passwords = [];
            for (let i = 0; i < count; i++) {
                generatePassword();
                passwords.push(currentPassword);
            }
            
            const message = `已生成 ${count} 个密码：\n\n${passwords.join('\n')}\n\n是否复制到剪贴板？`;
            if (confirm(message)) {
                navigator.clipboard.writeText(passwords.join('\n')).then(() => {
                    alert('已复制到剪贴板！');
                }).catch(err => {
                    alert('复制失败: ' + err.message);
                });
            }
        }
        
        // 显示密码
        function displayPassword(password) {
            document.getElementById('passwordDisplay').textContent = password;
            updateStrength(password);
        }
        
        // 更新密码强度
        function updateStrength(password) {
            let strength = 0;
            const length = password.length;
            
            // 长度检查
            if (length >= 8) strength++;
            if (length >= 12) strength++;
            if (length >= 16) strength++;
            
            // 字符类型检查
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumbers = /[0-9]/.test(password);
            const hasSymbols = /[^A-Za-z0-9]/.test(password);
            
            const charTypes = [hasUpperCase, hasLowerCase, hasNumbers, hasSymbols].filter(Boolean).length;
            if (charTypes >= 2) strength++;
            if (charTypes >= 3) strength++;
            if (charTypes >= 4) strength++;
            
            // 计算最终强度
            let strengthLevel = 0;
            if (strength >= 5) strengthLevel = 4; // 非常强
            else if (strength >= 4) strengthLevel = 3; // 强
            else if (strength >= 3) strengthLevel = 2; // 中等
            else if (strength >= 2) strengthLevel = 1; // 弱
            
            // 更新强度条
            const strengthBars = ['strength1', 'strength2', 'strength3', 'strength4'];
            strengthBars.forEach((id, index) => {
                const bar = document.getElementById(id);
                bar.className = 'strength-bar';
                
                if (index < strengthLevel) {
                    if (strengthLevel <= 1) bar.classList.add('weak');
                    else if (strengthLevel <= 2) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
            
            // 更新强度文本
            const strengthTexts = ['弱', '中等', '强', '非常强'];
            document.getElementById('strengthText').textContent = 
                `密码强度：${strengthTexts[strengthLevel - 1] || '弱'}`;
        }
        
        // 复制当前密码
        function copyCurrentPassword() {
            if (!currentPassword) {
                alert('请先生成密码');
                return;
            }
            
            navigator.clipboard.writeText(currentPassword).then(() => {
                alert('密码已复制到剪贴板！');
            }).catch(err => {
                alert('复制失败: ' + err.message);
            });
        }
        
        // 复制所有历史密码
        function copyAllHistory() {
            if (history.length === 0) {
                alert('没有历史密码可复制');
                return;
            }
            
            const allPasswords = history.map(item => item.password).join('\n');
            navigator.clipboard.writeText(allPasswords).then(() => {
                alert(`已复制 ${history.length} 个密码到剪贴板！`);
            }).catch(err => {
                alert('复制失败: ' + err.message);
            });
        }
        
        // 下载所有密码
        function downloadAllPasswords() {
            if (history.length === 0) {
                alert('没有历史密码可下载');
                return;
            }
            
            const format = document.getElementById('fileFormat').value;
            let content = '';
            let filename = `passwords_${new Date().toISOString().slice(0, 10)}`;
            
            switch (format) {
                case 'txt':
                    content = history.map(item => `${item.password} (${item.time})`).join('\n');
                    filename += '.txt';
                    break;
                case 'csv':
                    content = '密码,生成时间\n' + history.map(item => `"${item.password}","${item.time}"`).join('\n');
                    filename += '.csv';
                    break;
                case 'json':
                    content = JSON.stringify(history, null, 2);
                    filename += '.json';
                    break;
            }
            
            downloadFile(content, filename, format);
        }
        
        // 批量生成并下载
        function batchGenerateAndDownload() {
            const count = parseInt(document.getElementById('batchCount').value);
            const format = document.getElementById('fileFormat').value;
            
            if (isNaN(count) || count < 1 || count > 100) {
                alert('请输入1-100之间的数量');
                return;
            }
            
            const passwords = [];
            for (let i = 0; i < count; i++) {
                generatePassword();
                passwords.push({
                    password: currentPassword,
                    time: new Date().toLocaleString()
                });
            }
            
            let content = '';
            let filename = `batch_passwords_${new Date().toISOString().slice(0, 10)}`;
            
            switch (format) {
                case 'txt':
                    content = passwords.map(item => `${item.password} (${item.time})`).join('\n');
                    filename += '.txt';
                    break;
                case 'csv':
                    content = '密码,生成时间\n' + passwords.map(item => `"${item.password}","${item.time}"`).join('\n');
                    filename += '.csv';
                    break;
                case 'json':
                    content = JSON.stringify(passwords, null, 2);
                    filename += '.json';
                    break;
            }
            
            downloadFile(content, filename, format);
            alert(`已生成 ${count} 个密码并下载！`);
        }
        
        // 下载文件
        function downloadFile(content, filename, format) {
            const blob = new Blob([content], { 
                type: format === 'json' ? 'application/json' : 
                      format === 'csv' ? 'text/csv' : 'text/plain'
            });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }
        
        // 清空当前输入
        function clearInput() {
            currentPassword = '';
            document.getElementById('passwordDisplay').textContent = '点击生成密码';
            document.getElementById('strengthText').textContent = '密码强度：-';
            
            const strengthBars = ['strength1', 'strength2', 'strength3', 'strength4'];
            strengthBars.forEach(id => {
                document.getElementById(id).className = 'strength-bar';
            });
        }
        
        // 添加到历史记录
        function addToHistory(password) {
            history.unshift({
                password: password,
                time: new Date().toLocaleString()
            });
            
            // 保留最近50条记录
            if (history.length > 50) {
                history = history.slice(0, 50);
            }
            
            localStorage.setItem('passwordHistory', JSON.stringify(history));
            renderHistory();
        }
        
        // 渲染历史记录
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            
            if (history.length === 0) {
                historyList.innerHTML = '<li class="empty-history">暂无生成历史</li>';
                return;
            }
            
            historyList.innerHTML = history.map((item, index) => `
                <li class="history-item">
                    <span class="history-password">${item.password}</span>
                    <span class="history-time">${item.time}</span>
                    <div class="history-actions">
                        <button class="history-btn" onclick="copyHistoryPassword(${index})">复制</button>
                        <button class="history-btn" onclick="removeHistoryItem(${index})">删除</button>
                    </div>
                </li>
            `).join('');
        }
        
        // 复制历史密码
        function copyHistoryPassword(index) {
            const password = history[index].password;
            navigator.clipboard.writeText(password).then(() => {
                alert('密码已复制到剪贴板！');
            }).catch(err => {
                alert('复制失败: ' + err.message);
            });
        }
        
        // 删除历史记录项
        function removeHistoryItem(index) {
            history.splice(index, 1);
            localStorage.setItem('passwordHistory', JSON.stringify(history));
            renderHistory();
        }
        
        // 清空历史记录
        function clearHistory() {
            if (confirm('确定要清空所有生成历史吗？')) {
                history = [];
                localStorage.removeItem('passwordHistory');
                renderHistory();
            }
        }
    </script>
</body>
</html>

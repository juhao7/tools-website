<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟计时器 - 专注事项管理</title>
    <style>
        /* CSS变量 - 参考待办事项网页的颜色系统 */
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: rgba(255,255,255,0.05);
            --bg-card: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.1);
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --accent: #7c5cff;
            --accent-light: rgba(124, 92, 255, 0.2);
            --danger: #ff6b6b;
            --warning: #ffa726;
            --success: #66bb6a;
            --info: #42a5f5;
            
            /* 番茄钟专用颜色 */
            --work-color: #FF6347;    /* 工作状态 - 番茄红 */
            --break-color: #4CAF50;   /* 休息状态 - 绿色 */
            --long-break-color: #2196F3; /* 长休息 - 蓝色 */
        }

        :root.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: rgba(0,0,0,0.04);
            --bg-card: rgba(255,255,255,0.95);
            --border: rgba(0,0,0,0.08);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(0,0,0,0.65);
            --text-muted: rgba(0,0,0,0.35);
            --accent: #6c4cff;
            --accent-light: rgba(108, 76, 255, 0.1);
            --danger: #ff4757;
            --warning: #ff9100;
            --success: #2ed573;
            --info: #1e88e5;
        }

        /* 重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 40px 20px;
            transition: background 0.3s;
        }

        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 主题切换按钮 - 与待办事项网页一致 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            color: var(--text-primary);
        }

        .tool-btn:hover {
            transform: scale(1.05);
        }

        /* 头部 - 与待办事项网页一致 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .header h1 span {
            background: linear-gradient(135deg, #FF6347, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* 主要内容布局 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* 计时器部分 */
        .timer-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }

        .timer-circle {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: var(--bg-secondary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.5s ease;
        }

        .timer-circle.work {
            border: 4px solid var(--work-color);
            box-shadow: 0 10px 30px rgba(255, 99, 71, 0.2);
        }

        .timer-circle.break {
            border: 4px solid var(--break-color);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.2);
        }

        .timer-circle.long-break {
            border: 4px solid var(--long-break-color);
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.2);
        }

        .timer-time {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .timer-status {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .timer-status.work {
            color: var(--work-color);
        }

        .timer-status.break {
            color: var(--break-color);
        }

        .timer-status.long-break {
            color: var(--long-break-color);
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            max-width: 250px;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .progress-fill.work {
            background: var(--work-color);
        }

        .progress-fill.break {
            background: var(--break-color);
        }

        .progress-fill.long-break {
            background: var(--long-break-color);
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .control-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--text-primary);
        }

        .control-btn:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #FF6347, #E55A3E);
            border-color: transparent;
            color: white;
            width: 80px;
            height: 80px;
            font-size: 1.8rem;
        }

        .control-btn.primary:hover {
            box-shadow: 0 8px 25px rgba(255, 99, 71, 0.4);
        }

        /* 专注事项设置部分 */
        .task-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* 任务输入 */
        .task-input-group {
            margin-bottom: 20px;
        }

        .task-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .task-input::placeholder {
            color: var(--text-muted);
        }

        .task-input:focus {
            border-color: var(--accent);
        }

        /* 标签选择 */
        .tag-selection {
            margin-bottom: 20px;
        }

        .tag-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
        }

        .tag-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-secondary);
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .tag-btn:hover {
            border-color: var(--accent);
            color: var(--text-secondary);
        }

        .tag-btn.active {
            border-color: var(--accent);
            background: var(--accent-light);
            color: var(--accent);
        }

        /* 优先级选择 */
        .priority-selection {
            margin-bottom: 20px;
        }

        .priority-buttons {
            display: flex;
            gap: 8px;
        }

        .priority-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .priority-btn:hover {
            border-color: var(--accent);
        }

        .priority-btn.active.high {
            border-color: var(--danger);
            background: rgba(255,107,107,0.15);
            color: var(--danger);
        }

        .priority-btn.active.medium {
            border-color: var(--warning);
            background: rgba(255,167,38,0.15);
            color: var(--warning);
        }

        .priority-btn.active.low {
            border-color: var(--success);
            background: rgba(102,187,106,0.15);
            color: var(--success);
        }

        /* 任务备注 */
        .task-note {
            margin-bottom: 20px;
        }

        .note-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .note-toggle button {
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }

        .note-toggle button:hover {
            color: var(--accent);
        }

        .note-toggle .line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .note-input {
            width: 100%;
            padding: 12px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            resize: vertical;
            min-height: 60px;
            display: none;
        }

        .note-input.show {
            display: block;
        }

        .note-input::placeholder {
            color: var(--text-muted);
        }

        .note-input:focus {
            border-color: var(--accent);
        }

        /* 专注统计 */
        .focus-stats {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* 当前任务显示 */
        .current-task {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .task-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .task-meta {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        .task-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .task-tag.work {
            background: rgba(66,165,245,0.15);
            color: var(--info);
        }

        .task-tag.life {
            background: rgba(255,167,38,0.15);
            color: var(--warning);
        }

        .task-tag.study {
            background: rgba(102,187,106,0.15);
            color: var(--success);
        }

        .task-tag.other {
            background: var(--accent-light);
            color: var(--accent);
        }

        /* 设置弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h3 {
            margin-bottom: 24px;
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal h3::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .form-group .input-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .form-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .form-options .opt-btn {
            flex: 1;
            text-align: center;
            min-width: 80px;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-muted);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .form-options .opt-btn:hover {
            border-color: var(--accent);
            color: var(--text-secondary);
        }

        .form-options .opt-btn.active {
            border-color: var(--accent);
            background: var(--accent-light);
            color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 24px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: var(--accent);
            border-color: transparent;
            color: white;
        }

        .modal-btn.primary:hover {
            box-shadow: 0 4px 15px rgba(124, 92, 255, 0.4);
        }

        /* 设置按钮 */
        .settings-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--text-primary);
        }

        .settings-btn:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            background: var(--accent-light);
        }

        /* 历史记录 */
        .history-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .clear-history:hover {
            color: var(--danger);
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .history-item {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            max-width: 200px;
        }

        .history-item:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .history-item .history-task {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item .history-time {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* 页脚 - 与待办事项网页一致 */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
        }

        .quick-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .quick-link {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            transition: all 0.2s;
        }

        .quick-link:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 动画 */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .pulse-animation {
            animation: pulse 0.5s ease;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .timer-circle {
                width: 200px;
                height: 200px;
            }
            
            .timer-time {
                font-size: 2.5rem;
            }
            
            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
            
            .control-btn.primary {
                width: 65px;
                height: 65px;
                font-size: 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .theme-toggle {
                top: 10px;
                right: 10px;
            }
            
            .tool-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            
            .settings-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .timer-circle {
                width: 180px;
                height: 180px;
            }
            
            .timer-time {
                font-size: 2rem;
            }
            
            .tag-buttons {
                flex-direction: column;
            }
            
            .priority-buttons {
                flex-direction: column;
            }
            
            .current-task {
                flex-direction: column;
                text-align: center;
            }
            
            .task-meta {
                justify-content: center;
            }
            
            .modal {
                width: 95%;
                padding: 20px;
            }
            
            .form-options {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 - 与待办事项网页一致 -->
    <div class="theme-toggle">
        <button class="tool-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
    </div>
    
    <div class="container">
        <!-- 头部 - 与待办事项网页一致 -->
        <div class="header">
            <h1>番茄钟<span>计时器</span></h1>
            <p>基于番茄工作法的专注计时工具，帮助您提升专注力和工作效率</p>
        </div>

        <!-- 主要内容布局 -->
        <div class="main-content">
            <!-- 计时器部分 -->
            <div class="timer-section">
                <div class="timer-circle work" id="timerCircle">
                    <div class="timer-time" id="timerTime">25:00</div>
                    <div class="timer-status work" id="timerStatus">工作</div>
                </div>
                
                <!-- 进度条 -->
                <div class="progress-bar">
                    <div class="progress-fill work" id="progressFill" style="width: 100%"></div>
                </div>
                
                <!-- 控制按钮 -->
                <div class="controls">
                    <button class="control-btn" id="resetBtn" title="重置">
                        🔄
                    </button>
                    <button class="control-btn primary" id="startPauseBtn" title="开始/暂停">
                        ▶️
                    </button>
                    <button class="control-btn" id="skipBtn" title="跳过">
                        ⏭️
                    </button>
                    <button class="settings-btn" id="settingsBtn" title="设置">
                        ⚙️
                    </button>
                </div>
            </div>

            <!-- 专注事项设置部分 -->
            <div class="task-section">
                <div class="section-title">专注事项设置</div>
                
                <!-- 当前任务显示 -->
                <div class="current-task" id="currentTaskDisplay">
                    <div class="task-icon">🎯</div>
                    <div class="task-info">
                        <div class="task-name" id="currentTaskName">未设置专注事项</div>
                        <div class="task-meta">
                            <span class="task-tag" id="currentTaskTag">请选择任务</span>
                            <span id="currentTaskPriority"></span>
                        </div>
                    </div>
                </div>
                
                <!-- 任务输入 -->
                <div class="task-input-group">
                    <input type="text" class="task-input" id="taskInput" placeholder="输入您要专注的任务...">
                </div>
                
                <!-- 标签选择 -->
                <div class="tag-selection">
                    <label class="tag-label">任务标签</label>
                    <div class="tag-buttons">
                        <button class="tag-btn active" data-tag="work" onclick="selectTag(this)">💼 工作</button>
                        <button class="tag-btn" data-tag="life" onclick="selectTag(this)">🏠 生活</button>
                        <button class="tag-btn" data-tag="study" onclick="selectTag(this)">📚 学习</button>
                        <button class="tag-btn" data-tag="other" onclick="selectTag(this)">📌 其他</button>
                    </div>
                </div>
                
                <!-- 优先级选择 -->
                <div class="priority-selection">
                    <label class="tag-label">优先级</label>
                    <div class="priority-buttons">
                        <button class="priority-btn high" data-priority="high" onclick="selectPriority(this)">🔴 高</button>
                        <button class="priority-btn medium active" data-priority="medium" onclick="selectPriority(this)">🟡 中</button>
                        <button class="priority-btn low" data-priority="low" onclick="selectPriority(this)">🟢 低</button>
                    </div>
                </div>
                
                <!-- 任务备注 -->
                <div class="task-note">
                    <div class="note-toggle">
                        <button onclick="toggleNoteInput()">📝 添加备注</button>
                        <div class="line"></div>
                    </div>
                    <textarea class="note-input" id="noteInput" placeholder="添加任务备注信息..."></textarea>
                </div>
                
                <!-- 设置按钮 -->
                <button class="add-btn" onclick="setFocusTask()" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #FF6347, #E55A3E); border: none; border-radius: 12px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;">
                    设置专注事项
                </button>
            </div>
        </div>

        <!-- 专注统计 -->
        <div class="focus-stats">
            <div class="section-title">专注统计</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="completedPomodoros">0</div>
                    <div class="stat-label">完成番茄</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalFocusTime">0</div>
                    <div class="stat-label">专注分钟</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="currentSet">1</div>
                    <div class="stat-label">当前组</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="taskCompletionRate">0%</div>
                    <div class="stat-label">任务完成率</div>
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="history-section">
            <div class="history-title">
                <span>📜 专注历史</span>
                <button class="clear-history" id="clearHistory">清空记录</button>
            </div>
            <div class="history-list" id="historyList">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 页脚 - 与待办事项网页一致 -->
        <div class="footer">
            <p>© 2024 实用工具箱 - 番茄钟计时器</p>
            <p>最后更新时间：<span id="lastUpdate"></span></p>
            <div class="quick-links">
                <a href="index.html" class="quick-link">🏠 返回主页</a>
                <a href="todo-list.html" class="quick-link">📋 待办事项</a>
                <a href="pomodoro-timer.html" class="quick-link">🍅 番茄钟</a>
                <a href="tools/json-formatter.html" class="quick-link">📋 JSON格式化</a>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3>⚙️ 时间设置</h3>
            
            <div class="form-group">
                <label>工作时间（分钟）</label>
                <input type="number" id="workTimeInput" min="1" max="120" value="25">
                <div class="input-hint">建议设置为25分钟，这是番茄工作法的标准时间</div>
            </div>
            
            <div class="form-group">
                <label>短休息时间（分钟）</label>
                <input type="number" id="breakTimeInput" min="1" max="30" value="5">
                <div class="input-hint">建议设置为5分钟，短暂休息有助于恢复精力</div>
            </div>
            
            <div class="form-group">
                <label>长休息时间（分钟）</label>
                <input type="number" id="longBreakTimeInput" min="1" max="60" value="15">
                <div class="input-hint">建议设置为15分钟，长时间工作后需要充分休息</div>
            </div>
            
            <div class="form-group">
                <label>长休息间隔（番茄数）</label>
                <input type="number" id="longBreakIntervalInput" min="2" max="10" value="4">
                <div class="input-hint">建议设置为4，每完成4个番茄后进入长休息</div>
            </div>
            
            <div class="form-group">
                <label>声音提示</label>
                <div class="form-options">
                    <button class="opt-btn active" data-sound="true" onclick="selectSoundOption(this)">开启</button>
                    <button class="opt-btn" data-sound="false" onclick="selectSoundOption(this)">关闭</button>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="modal-btn" onclick="closeModal('settingsModal')">取消</button>
                <button class="modal-btn primary" onclick="saveSettings()">保存设置</button>
            </div>
        </div>
    </div>

    <script>
        // 番茄钟应用状态
        const pomodoroApp = {
            // 计时器状态
            timerState: {
                isRunning: false,
                isPaused: false,
                currentTime: 25 * 60, // 以秒为单位
                totalTime: 25 * 60,
                currentMode: 'work', // 'work', 'break', 'longBreak'
                intervalId: null,
                completedPomodoros: 0,
                currentSet: 1
            },
            
            // 当前专注任务
            currentTask: {
                name: '',
                tag: 'work',
                priority: 'medium',
                note: '',
                startTime: null
            },
            
            // 设置
            settings: {
                workTime: 25, // 分钟
                breakTime: 5,
                longBreakTime: 15,
                longBreakInterval: 4,
                soundEnabled: true
            },
            
            // 统计
            stats: {
                todayPomodoros: 0,
                todayFocusTime: 0,
                todayBreakTime: 0,
                taskCompletionRate: 0,
                lastDate: new Date().toDateString()
            },
            
            // 历史记录
            history: JSON.parse(localStorage.getItem('pomodoroHistory')) || [],
            
            // DOM元素引用
            elements: {
                timerTime: document.getElementById('timerTime'),
                timerStatus: document.getElementById('timerStatus'),
                timerCircle: document.getElementById('timerCircle'),
                progressFill: document.getElementById('progressFill'),
                startPauseBtn: document.getElementById('startPauseBtn'),
                resetBtn: document.getElementById('resetBtn'),
                skipBtn: document.getElementById('skipBtn'),
                settingsBtn: document.getElementById('settingsBtn'),
                completedPomodoros: document.getElementById('completedPomodoros'),
                currentSet: document.getElementById('currentSet'),
                totalFocusTime: document.getElementById('totalFocusTime'),
                taskCompletionRate: document.getElementById('taskCompletionRate'),
                currentTaskName: document.getElementById('currentTaskName'),
                currentTaskTag: document.getElementById('currentTaskTag'),
                currentTaskPriority: document.getElementById('currentTaskPriority'),
                historyList: document.getElementById('historyList'),
                clearHistory: document.getElementById('clearHistory'),
                lastUpdate: document.getElementById('lastUpdate')
            },
            
            // 初始化应用
            init: function() {
                this.loadSettings();
                this.loadStats();
                this.setupEventListeners();
                this.updateDisplay();
                this.updateStatsDisplay();
                this.updateCurrentTaskDisplay();
                this.renderHistory();
                this.checkDateChange();
                this.loadSettingsToUI();
                
                // 设置最后更新时间
                this.elements.lastUpdate.textContent = new Date().toLocaleString();
            },
            
            // 加载设置
            loadSettings: function() {
                const savedSettings = localStorage.getItem('pomodoroSettings');
                if (savedSettings) {
                    try {
                        const parsed = JSON.parse(savedSettings);
                        this.settings = { ...this.settings, ...parsed };
                    } catch (e) {
                        console.error('加载设置失败:', e);
                    }
                }
                
                // 更新计时器
                this.timerState.totalTime = this.settings.workTime * 60;
                this.timerState.currentTime = this.settings.workTime * 60;
            },
            
            // 保存设置
            saveSettings: function() {
                localStorage.setItem('pomodoroSettings', JSON.stringify(this.settings));
            },
            
            // 加载设置到UI
            loadSettingsToUI: function() {
                document.getElementById('workTimeInput').value = this.settings.workTime;
                document.getElementById('breakTimeInput').value = this.settings.breakTime;
                document.getElementById('longBreakTimeInput').value = this.settings.longBreakTime;
                document.getElementById('longBreakIntervalInput').value = this.settings.longBreakInterval;
                
                // 更新声音设置按钮
                document.querySelectorAll('.form-options .opt-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.sound === String(this.settings.soundEnabled)) {
                        btn.classList.add('active');
                    }
                });
            },
            
            // 加载统计
            loadStats: function() {
                const savedStats = localStorage.getItem('pomodoroStats');
                if (savedStats) {
                    try {
                        const parsed = JSON.parse(savedStats);
                        this.stats = { ...this.stats, ...parsed };
                    } catch (e) {
                        console.error('加载统计失败:', e);
                    }
                }
            },
            
            // 保存统计
            saveStats: function() {
                localStorage.setItem('pomodoroStats', JSON.stringify(this.stats));
            },
            
            // 检查日期变化，重置每日统计
            checkDateChange: function() {
                const today = new Date().toDateString();
                if (this.stats.lastDate !== today) {
                    this.stats.todayPomodoros = 0;
                    this.stats.todayFocusTime = 0;
                    this.stats.todayBreakTime = 0;
                    this.stats.lastDate = today;
                    this.saveStats();
                    this.updateStatsDisplay();
                }
            },
            
            // 设置事件监听器
            setupEventListeners: function() {
                // 开始/暂停按钮
                this.elements.startPauseBtn.addEventListener('click', () => {
                    this.toggleTimer();
                });
                
                // 重置按钮
                this.elements.resetBtn.addEventListener('click', () => {
                    this.resetTimer();
                });
                
                // 跳过按钮
                this.elements.skipBtn.addEventListener('click', () => {
                    this.skipToNext();
                });
                
                // 设置按钮
                this.elements.settingsBtn.addEventListener('click', () => {
                    this.openSettingsModal();
                });
                
                // 清空历史记录
                this.elements.clearHistory.addEventListener('click', () => {
                    this.clearHistory();
                });
                
                // 键盘快捷键
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.toggleTimer();
                    } else if (e.code === 'KeyR') {
                        this.resetTimer();
                    } else if (e.code === 'KeyS') {
                        this.skipToNext();
                    }
                });
            },
            
            // 切换计时器状态
            toggleTimer: function() {
                if (this.timerState.isRunning) {
                    this.pauseTimer();
                } else {
                    this.startTimer();
                }
            },
            
            // 开始计时
            startTimer: function() {
                if (this.timerState.isRunning) return;
                
                // 如果没有设置专注任务，提示用户
                if (!this.currentTask.name && this.timerState.currentMode === 'work') {
                    const taskName = document.getElementById('taskInput').value.trim();
                    if (taskName) {
                        this.setFocusTask();
                    } else {
                        alert('请先设置专注事项！');
                        document.getElementById('taskInput').focus();
                        return;
                    }
                }
                
                this.timerState.isRunning = true;
                this.timerState.isPaused = false;
                this.elements.startPauseBtn.innerHTML = '⏸️';
                this.elements.startPauseBtn.title = '暂停';
                
                // 记录开始时间
                if (this.timerState.currentMode === 'work' && !this.currentTask.startTime) {
                    this.currentTask.startTime = new Date();
                }
                
                this.timerState.intervalId = setInterval(() => {
                    this.tick();
                }, 1000);
                
                // 添加脉冲动画
                this.elements.timerCircle.classList.add('pulse-animation');
                setTimeout(() => {
                    this.elements.timerCircle.classList.remove('pulse-animation');
                }, 500);
            },
            
            // 暂停计时
            pauseTimer: function() {
                if (!this.timerState.isRunning) return;
                
                this.timerState.isRunning = false;
                this.timerState.isPaused = true;
                this.elements.startPauseBtn.innerHTML = '▶️';
                this.elements.startPauseBtn.title = '继续';
                
                clearInterval(this.timerState.intervalId);
            },
            
            // 重置计时
            resetTimer: function() {
                this.pauseTimer();
                this.timerState.isPaused = false;
                this.elements.startPauseBtn.innerHTML = '▶️';
                this.elements.startPauseBtn.title = '开始';
                
                // 根据当前模式设置时间
                let totalTime;
                switch (this.timerState.currentMode) {
                    case 'work':
                        totalTime = this.settings.workTime * 60;
                        break;
                    case 'break':
                        totalTime = this.settings.breakTime * 60;
                        break;
                    case 'longBreak':
                        totalTime = this.settings.longBreakTime * 60;
                        break;
                }
                
                this.timerState.currentTime = totalTime;
                this.timerState.totalTime = totalTime;
                this.updateDisplay();
            },
            
            // 跳到下一个状态
            skipToNext: function() {
                this.pauseTimer();
                this.timerState.isPaused = false;
                this.elements.startPauseBtn.innerHTML = '▶️';
                this.elements.startPauseBtn.title = '开始';
                
                // 切换到下一个状态
                this.switchToNextMode();
                this.updateDisplay();
            },
            
            // 计时器每秒调用
            tick: function() {
                if (this.timerState.currentTime <= 0) {
                    this.timerComplete();
                    return;
                }
                
                this.timerState.currentTime--;
                this.updateDisplay();
                
                // 更新统计
                if (this.timerState.currentMode === 'work') {
                    this.stats.todayFocusTime = (this.stats.todayFocusTime || 0) + (1/60);
                } else {
                    this.stats.todayBreakTime = (this.stats.todayBreakTime || 0) + (1/60);
                }
            },
            
            // 计时器完成
            timerComplete: function() {
                this.pauseTimer();
                
                // 播放声音提示（如果启用）
                this.playCompletionSound();
                
                // 更新统计
                if (this.timerState.currentMode === 'work') {
                    this.timerState.completedPomodoros++;
                    this.stats.todayPomodoros++;
                    this.saveStats();
                    this.updateStatsDisplay();
                    
                    // 添加到历史记录
                    this.addToHistory();
                    
                    // 重置当前任务开始时间
                    this.currentTask.startTime = null;
                }
                
                // 切换到下一个模式
                this.switchToNextMode();
                this.updateDisplay();
            },
            
            // 切换到下一个模式
            switchToNextMode: function() {
                if (this.timerState.currentMode === 'work') {
                    // 工作结束后，检查是否需要长休息
                    if (this.timerState.completedPomodoros % this.settings.longBreakInterval === 0 && 
                        this.timerState.completedPomodoros > 0) {
                        this.timerState.currentMode = 'longBreak';
                        this.timerState.currentTime = this.settings.longBreakTime * 60;
                        this.timerState.totalTime = this.settings.longBreakTime * 60;
                    } else {
                        this.timerState.currentMode = 'break';
                        this.timerState.currentTime = this.settings.breakTime * 60;
                        this.timerState.totalTime = this.settings.breakTime * 60;
                    }
                } else {
                    // 休息结束后，回到工作模式
                    this.timerState.currentMode = 'work';
                    this.timerState.currentTime = this.settings.workTime * 60;
                    this.timerState.totalTime = this.settings.workTime * 60;
                    
                    // 如果完成一个番茄组，更新组数
                    if (this.timerState.currentMode === 'work' && 
                        this.timerState.completedPomodoros > 0 &&
                        this.timerState.completedPomodoros % this.settings.longBreakInterval === 0) {
                        this.timerState.currentSet++;
                    }
                }
            },
            
            // 设置专注任务
            setFocusTask: function() {
                const taskName = document.getElementById('taskInput').value.trim();
                if (!taskName) {
                    alert('请输入专注事项！');
                    document.getElementById('taskInput').focus();
                    return;
                }
                
                // 获取选中的标签
                const activeTag = document.querySelector('.tag-btn.active');
                const tag = activeTag ? activeTag.dataset.tag : 'work';
                
                // 获取选中的优先级
                const activePriority = document.querySelector('.priority-btn.active');
                const priority = activePriority ? activePriority.dataset.priority : 'medium';
                
                // 获取备注
                const note = document.getElementById('noteInput').value.trim();
                
                // 更新当前任务
                this.currentTask = {
                    name: taskName,
                    tag: tag,
                    priority: priority,
                    note: note,
                    startTime: null
                };
                
                // 更新显示
                this.updateCurrentTaskDisplay();
                
                // 清空输入
                document.getElementById('taskInput').value = '';
                document.getElementById('noteInput').value = '';
                document.getElementById('noteInput').classList.remove('show');
                
                // 重置标签和优先级选择
                document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.tag-btn[data-tag="work"]').classList.add('active');
                
                document.querySelectorAll('.priority-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.priority-btn.medium').classList.add('active');
            },
            
            // 更新当前任务显示
            updateCurrentTaskDisplay: function() {
                const { name, tag, priority, note } = this.currentTask;
                
                this.elements.currentTaskName.textContent = name || '未设置专注事项';
                
                // 更新标签
                const tagLabels = {
                    work: '💼 工作',
                    life: '🏠 生活',
                    study: '📚 学习',
                    other: '📌 其他'
                };
                this.elements.currentTaskTag.textContent = tagLabels[tag] || '请选择任务';
                this.elements.currentTaskTag.className = `task-tag ${tag}`;
                
                // 更新优先级
                const priorityLabels = {
                    high: '🔴 高优先级',
                    medium: '🟡 中优先级',
                    low: '🟢 低优先级'
                };
                this.elements.currentTaskPriority.textContent = priorityLabels[priority] || '';
            },
            
            // 更新显示
            updateDisplay: function() {
                // 更新时间显示
                const minutes = Math.floor(this.timerState.currentTime / 60);
                const seconds = this.timerState.currentTime % 60;
                const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                this.elements.timerTime.textContent = timeString;
                
                // 更新状态显示
                let statusText, statusClass;
                switch (this.timerState.currentMode) {
                    case 'work':
                        statusText = '工作';
                        statusClass = 'work';
                        break;
                    case 'break':
                        statusText = '短休息';
                        statusClass = 'break';
                        break;
                    case 'longBreak':
                        statusText = '长休息';
                        statusClass = 'long-break';
                        break;
                }
                
                this.elements.timerStatus.textContent = statusText;
                this.elements.timerStatus.className = `timer-status ${statusClass}`;
                
                // 更新圆形计时器样式
                this.elements.timerCircle.className = `timer-circle ${statusClass}`;
                
                // 更新进度条
                const progressPercentage = (this.timerState.currentTime / this.timerState.totalTime) * 100;
                this.elements.progressFill.style.width = `${progressPercentage}%`;
                this.elements.progressFill.className = `progress-fill ${statusClass}`;
                
                // 更新统计显示
                this.elements.completedPomodoros.textContent = this.timerState.completedPomodoros;
                this.elements.currentSet.textContent = this.timerState.currentSet;
                this.elements.totalFocusTime.textContent = Math.floor(this.stats.todayFocusTime || 0);
                
                // 计算任务完成率
                if (this.currentTask.name) {
                    const completionRate = Math.min(100, Math.floor((this.timerState.completedPomodoros / 4) * 100));
                    this.elements.taskCompletionRate.textContent = `${completionRate}%`;
                    this.stats.taskCompletionRate = completionRate;
                } else {
                    this.elements.taskCompletionRate.textContent = '0%';
                }
            },
            
            // 更新统计显示
            updateStatsDisplay: function() {
                // 统计已经在updateDisplay中更新
            },
            
            // 打开设置弹窗
            openSettingsModal: function() {
                // 暂停计时器（如果正在运行）
                if (this.timerState.isRunning) {
                    this.pauseTimer();
                }
                
                // 加载当前设置到UI
                this.loadSettingsToUI();
                
                // 显示弹窗
                document.getElementById('settingsModal').classList.add('active');
            },
            
            // 保存设置
            saveSettingsToApp: function() {
                // 获取UI中的值
                const workTime = parseInt(document.getElementById('workTimeInput').value) || 25;
                const breakTime = parseInt(document.getElementById('breakTimeInput').value) || 5;
                const longBreakTime = parseInt(document.getElementById('longBreakTimeInput').value) || 15;
                const longBreakInterval = parseInt(document.getElementById('longBreakIntervalInput').value) || 4;
                
                // 验证值范围
                const validatedSettings = {
                    workTime: Math.max(1, Math.min(120, workTime)),
                    breakTime: Math.max(1, Math.min(30, breakTime)),
                    longBreakTime: Math.max(1, Math.min(60, longBreakTime)),
                    longBreakInterval: Math.max(2, Math.min(10, longBreakInterval))
                };
                
                // 更新设置
                this.settings = { ...this.settings, ...validatedSettings };
                
                // 保存设置
                this.saveSettings();
                
                // 更新计时器（如果当前没有在运行）
                if (!this.timerState.isRunning && !this.timerState.isPaused) {
                    this.resetTimer();
                }
                
                // 关闭弹窗
                this.closeModal('settingsModal');
                
                // 更新显示
                this.updateDisplay();
                
                // 显示保存成功提示
                this.showNotification('设置已保存');
            },
            
            // 添加到历史记录
            addToHistory: function() {
                if (!this.currentTask.name) return;
                
                const historyItem = {
                    id: Date.now(),
                    task: this.currentTask.name,
                    tag: this.currentTask.tag,
                    priority: this.currentTask.priority,
                    note: this.currentTask.note,
                    startTime: this.currentTask.startTime,
                    endTime: new Date(),
                    duration: this.settings.workTime
                };
                
                this.history.unshift(historyItem);
                
                // 限制历史记录数量
                if (this.history.length > 20) {
                    this.history.pop();
                }
                
                // 保存到本地存储
                localStorage.setItem('pomodoroHistory', JSON.stringify(this.history));
                
                // 更新UI
                this.renderHistory();
            },
            
            // 渲染历史记录
            renderHistory: function() {
                if (this.history.length === 0) {
                    this.elements.historyList.innerHTML = '<div style="color: var(--text-muted); font-size: 0.9rem;">暂无记录</div>';
                    return;
                }
                
                this.elements.historyList.innerHTML = this.history.slice(0, 10).map(item => {
                    const tagLabels = {
                        work: '💼 工作',
                        life: '🏠 生活',
                        study: '📚 学习',
                        other: '📌 其他'
                    };
                    
                    const startTime = new Date(item.startTime);
                    const timeString = `${startTime.getHours().toString().padStart(2, '0')}:${startTime.getMinutes().toString().padStart(2, '0')}`;
                    
                    return `
                        <div class="history-item" data-id="${item.id}">
                            <div class="history-task">${item.task}</div>
                            <div class="history-time">${timeString} · ${tagLabels[item.tag] || '📌 其他'}</div>
                        </div>
                    `;
                }).join('');
            },
            
            // 清空历史记录
            clearHistory: function() {
                if (confirm('确定要清空所有历史记录吗？')) {
                    this.history = [];
                    localStorage.removeItem('pomodoroHistory');
                    this.renderHistory();
                }
            },
            
            // 关闭弹窗
            closeModal: function(modalId) {
                document.getElementById(modalId).classList.remove('active');
            },
            
            // 显示通知
            showNotification: function(message) {
                // 简单实现，可以替换为更美观的通知组件
                alert(message);
            },
            
            // 播放完成声音
            playCompletionSound: function() {
                if (!this.settings.soundEnabled) return;
                
                // 使用Web Audio API播放简单声音
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.5);
                } catch (e) {
                    console.log('无法播放声音:', e);
                }
            }
        };

        // 全局函数
        function selectTag(btn) {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function selectPriority(btn) {
            document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function selectSoundOption(btn) {
            document.querySelectorAll('.form-options .opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            pomodoroApp.settings.soundEnabled = btn.dataset.sound === 'true';
        }

        function toggleNoteInput() {
            document.getElementById('noteInput').classList.toggle('show');
        }

        function setFocusTask() {
            pomodoroApp.setFocusTask();
        }

        function saveSettings() {
            pomodoroApp.saveSettingsToApp();
        }

        function closeModal(modalId) {
            pomodoroApp.closeModal(modalId);
        }

        // 主题切换功能
        let isDark = true;
        
        function setTheme(light) {
            isDark = !light;
            document.documentElement.classList.toggle('light', light);
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) {
                themeBtn.textContent = light ? '☀️' : '🌙';
                themeBtn.title = light ? '切换到深色模式' : '切换到浅色模式';
            }
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }

        function toggleTheme() { 
            setTheme(isDark); 
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            // 检查保存的主题
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                setTheme(true);
            }
            
            // 初始化番茄钟应用
            pomodoroApp.init();
            
            // 为设置弹窗添加点击外部关闭功能
            document.getElementById('settingsModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    pomodoroApp.closeModal('settingsModal');
                }
            });
        });
    </script>
</body>
</html>

<!-- tools/text-diff.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本对比 - 实用工具箱</title>
    <link rel="stylesheet" href="../css/base.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: rgba(255,255,255,0.05);
            --bg-card: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.1);
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.4);
            --accent: #7c5cff;
            --accent-light: rgba(124, 92, 255, 0.2);
            --success: #66bb6a;
            --success-light: rgba(102, 187, 106, 0.15);
            --warning: #ffa726;
            --warning-light: rgba(255, 167, 38, 0.15);
            --danger: #ff6b6b;
            --danger-light: rgba(255, 107, 107, 0.15);
            --diff-add-bg: rgba(102, 187, 106, 0.15);
            --diff-add-border: rgba(102, 187, 106, 0.4);
            --diff-add-text: #66bb6a;
            --diff-remove-bg: rgba(255, 107, 107, 0.15);
            --diff-remove-border: rgba(255, 107, 107, 0.4);
            --diff-remove-text: #ff6b6b;
            --diff-change-bg: rgba(255, 167, 38, 0.15);
            --diff-change-border: rgba(255, 167, 38, 0.4);
            --diff-change-text: #ffa726;
        }

        :root.light {
            --bg-primary: #f0f2f5;
            --bg-secondary: rgba(0,0,0,0.04);
            --bg-card: rgba(255,255,255,0.95);
            --border: rgba(0,0,0,0.08);
            --text-primary: #1a1a2e;
            --text-secondary: rgba(0,0,0,0.65);
            --text-muted: rgba(0,0,0,0.35);
            --accent: #6c4cff;
            --accent-light: rgba(108, 76, 255, 0.1);
            --diff-add-bg: rgba(102, 187, 106, 0.2);
            --diff-add-border: rgba(102, 187, 106, 0.5);
            --diff-add-text: #2e7d32;
            --diff-remove-bg: rgba(255, 107, 107, 0.2);
            --diff-remove-border: rgba(255, 107, 107, 0.5);
            --diff-remove-text: #c62828;
            --diff-change-bg: rgba(255, 167, 38, 0.2);
            --diff-change-border: rgba(255, 167, 38, 0.5);
            --diff-change-text: #e65100;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 20px;
            transition: background 0.3s;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 时钟区域 */
        .clock-section {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .clock-time {
            font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 4px;
        }
        
        .clock-date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .tool-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .tool-btn:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        
        /* 操作栏 */
        .actions-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .action-btn {
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .action-btn:hover {
            border-color: var(--accent);
            background: var(--accent-light);
            transform: translateY(-1px);
        }
        
        .action-btn.primary {
            background: var(--accent);
            border-color: transparent;
            color: white;
        }
        
        .action-btn.primary:hover {
            box-shadow: 0 4px 15px rgba(124, 92, 255, 0.4);
        }
        
        .action-btn.success {
            background: var(--success);
            border-color: transparent;
            color: white;
        }
        
        .action-btn.warning {
            background: var(--warning);
            border-color: transparent;
            color: white;
        }
        
        .action-btn.danger {
            background: var(--danger);
            border-color: transparent;
            color: white;
        }
        
        .action-btn input[type="file"] {
            display: none;
        }
        
        .action-btn-spacer {
            flex: 1;
        }
        
        /* 对比选项 */
        .options-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .option-item label {
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
        }
        
        .option-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        
        .option-item select {
            padding: 8px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }
        
        /* 统计信息 */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: "SF Mono", monospace;
        }
        
        .stat-value.add {
            color: var(--success);
        }
        
        .stat-value.remove {
            color: var(--danger);
        }
        
        .stat-value.change {
            color: var(--warning);
        }
        
        .stat-value.same {
            color: var(--text-secondary);
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* 错误提醒 */
        .alert-section {
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert.error {
            background: var(--danger-light);
            border: 1px solid var(--diff-remove-border);
            color: var(--danger);
        }
        
        .alert.warning {
            background: var(--warning-light);
            border: 1px solid var(--diff-change-border);
            color: var(--warning);
        }
        
        .alert.success {
            background: var(--success-light);
            border: 1px solid var(--diff-add-border);
            color: var(--success);
        }
        
        .alert-icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .alert-close {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .alert-close:hover {
            opacity: 1;
        }
        
        /* 编辑器区域 */
        .editors-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .editor-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        
        .editor-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .editor-badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .editor-badge.original {
            background: var(--accent-light);
            color: var(--accent);
        }
        
        .editor-badge.modified {
            background: var(--warning-light);
            color: var(--warning);
        }
        
        .editor-actions {
            display: flex;
            gap: 8px;
        }
        
        .editor-action-btn {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .editor-action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .editor-textarea {
            width: 100%;
            height: 400px;
            padding: 16px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
            font-size: 13px;
            line-height: 1.7;
            resize: vertical;
            outline: none;
        }
        
        .editor-textarea::placeholder {
            color: var(--text-muted);
        }
        
        .editor-footer {
            display: flex;
            justify-content: space-between;
            padding: 10px 18px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }
        
        /* 对比结果 */
        .diff-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .diff-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        
        .diff-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .diff-legend {
            display: flex;
            gap: 16px;
            font-size: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        
        .legend-color.add {
            background: var(--diff-add-bg);
            border: 1px solid var(--diff-add-border);
        }
        
        .legend-color.remove {
            background: var(--diff-remove-bg);
            border: 1px solid var(--diff-remove-border);
        }
        
        .legend-color.change {
            background: var(--diff-change-bg);
            border: 1px solid var(--diff-change-border);
        }
        
        .diff-content {
            padding: 16px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
            font-size: 13px;
            line-height: 1.7;
        }
        
        .diff-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .diff-content::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .diff-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .diff-line {
            display: flex;
            padding: 2px 10px;
            border-radius: 4px;
            margin-bottom: 2px;
        }
        
        .diff-line.add {
            background: var(--diff-add-bg);
            border-left: 3px solid var(--diff-add-border);
        }
        
        .diff-line.remove {
            background: var(--diff-remove-bg);
            border-left: 3px solid var(--diff-remove-border);
        }
        
        .diff-line.change {
            background: var(--diff-change-bg);
            border-left: 3px solid var(--diff-change-border);
        }
        
        .diff-line.same {
            color: var(--text-muted);
        }
        
        .diff-line-number {
            min-width: 45px;
            color: var(--text-muted);
            user-select: none;
            text-align: right;
            padding-right: 12px;
            border-right: 1px solid var(--border);
            margin-right: 12px;
        }
        
        .diff-line-prefix {
            min-width: 20px;
            font-weight: 600;
            margin-right: 8px;
        }
        
        .diff-line.add .diff-line-prefix {
            color: var(--diff-add-text);
        }
        
        .diff-line.remove .diff-line-prefix {
            color: var(--diff-remove-text);
        }
        
        .diff-line.change .diff-line-prefix {
            color: var(--diff-change-text);
        }
        
        .diff-line-text {
            white-space: pre-wrap;
            word-break: break-all;
            flex: 1;
        }
        
        .diff-line-text .highlight {
            background: rgba(255, 255, 0, 0.3);
            padding: 0 2px;
            border-radius: 2px;
        }
        
        .diff-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .diff-empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 12px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .clock-time {
                font-size: 2rem;
            }
            
            .header h1 {
                font-size: 1.3rem;
            }
            
            .editors-container {
                grid-template-columns: 1fr;
            }
            
            .editor-textarea {
                height: 250px;
            }
            
            .actions-bar {
                flex-direction: column;
            }
            
            .action-btn {
                width: 100%;
                justify-content: center;
            }
            
            .action-btn-spacer {
                display: none;
            }
            
            .diff-legend {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 时钟区域 -->
        <div class="clock-section">
            <div class="clock-time" id="clock">00:00:00</div>
            <div class="clock-date" id="clockDate"></div>
        </div>
        
        <!-- 头部 -->
        <div class="header">
            <h1>📝 文本对比工具</h1>
            <div class="header-actions">
                <button class="tool-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
                <a href="../index.html" class="tool-btn" title="返回首页">🏠</a>
            </div>
        </div>
        
        <!-- 操作栏 -->
        <div class="actions-bar">
            <button class="action-btn primary" onclick="compareTexts()">🔍 开始对比</button>
            <button class="action-btn" onclick="swapTexts()">🔄 交换文本</button>
            <button class="action-btn" onclick="clearAll()">🗑️ 清空全部</button>
            <label class="action-btn">
                📤 上传左侧文件
                <input type="file" id="fileLeft" accept=".txt,.json,.xml,.html,.css,.js" onchange="uploadFile(this, 'left')">
            </label>
            <label class="action-btn">
                📤 上传右侧文件
                <input type="file" id="fileRight" accept=".txt,.json,.xml,.html,.css,.js" onchange="uploadFile(this, 'right')">
            </label>
            <div class="action-btn-spacer"></div>
            <button class="action-btn success" onclick="copyDiff()">📋 复制差异</button>
            <button class="action-btn" onclick="downloadReport()">📥 下载报告</button>
        </div>
        
        <!-- 对比选项 -->
        <div class="options-bar">
            <div class="option-item">
                <input type="checkbox" id="ignoreCase" onchange="compareTexts()">
                <label for="ignoreCase">忽略大小写</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="ignoreSpace" onchange="compareTexts()">
                <label for="ignoreSpace">忽略空白字符</label>
            </div>
            <div class="option-item">
                <input type="checkbox" id="ignoreEmptyLines" onchange="compareTexts()">
                <label for="ignoreEmptyLines">忽略空行</label>
            </div>
            <div class="option-item">
                <label>对比模式：</label>
                <select id="compareMode" onchange="compareTexts()">
                    <option value="line">按行对比</option>
                    <option value="word">按词对比</option>
                    <option value="char">按字符对比</option>
                </select>
            </div>
        </div>
        
        <!-- 统计信息 -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value same" id="statSame">0</div>
                <div class="stat-label">相同行</div>
            </div>
            <div class="stat-card">
                <div class="stat-value add" id="statAdd">0</div>
                <div class="stat-label">新增行</div>
            </div>
            <div class="stat-card">
                <div class="stat-value remove" id="statRemove">0</div>
                <div class="stat-label">删除行</div>
            </div>
            <div class="stat-card">
                <div class="stat-value change" id="statChange">0</div>
                <div class="stat-label">修改行</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSimilarity">0%</div>
                <div class="stat-label">相似度</div>
            </div>
        </div>
        
        <!-- 错误提醒区域 -->
        <div class="alert-section" id="alertSection"></div>
        
        <!-- 编辑器区域 -->
        <div class="editors-container">
            <!-- 左侧编辑器 -->
            <div class="editor-box">
                <div class="editor-header">
                    <div class="editor-title">
                        📄 原始文本
                        <span class="editor-badge original">原文</span>
                    </div>
                    <div class="editor-actions">
                        <button class="editor-action-btn" onclick="pasteText('left')">粘贴</button>
                        <button class="editor-action-btn" onclick="clearEditor('left')">清空</button>
                    </div>
                </div>
                <textarea class="editor-textarea" id="textLeft" placeholder="在此输入或粘贴原始文本..." oninput="updateStats('left')"></textarea>
                <div class="editor-footer">
                    <span id="statsLeft">0 行 | 0 字符</span>
                    <span id="timeLeft"></span>
                </div>
            </div>
            
            <!-- 右侧编辑器 -->
            <div class="editor-box">
                <div class="editor-header">
                    <div class="editor-title">
                        📄 修改文本
                        <span class="editor-badge modified">修改</span>
                    </div>
                    <div class="editor-actions">
                        <button class="editor-action-btn" onclick="pasteText('right')">粘贴</button>
                        <button class="editor-action-btn" onclick="clearEditor('right')">清空</button>
                    </div>
                </div>
                <textarea class="editor-textarea" id="textRight" placeholder="在此输入或粘贴修改后的文本..." oninput="updateStats('right')"></textarea>
                <div class="editor-footer">
                    <span id="statsRight">0 行 | 0 字符</span>
                    <span id="timeRight"></span>
                </div>
            </div>
        </div>
        
        <!-- 对比结果 -->
        <div class="diff-container">
            <div class="diff-header">
                <div class="diff-title">📊 对比结果</div>
                <div class="diff-legend">
                    <div class="legend-item">
                        <div class="legend-color add"></div>
                        <span>新增</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color remove"></div>
                        <span>删除</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color change"></div>
                        <span>修改</span>
                    </div>
                </div>
            </div>
            <div class="diff-content" id="diffContent">
                <div class="diff-empty">
                    <div class="diff-empty-icon">📝</div>
                    <p>在两侧输入文本后点击"开始对比"</p>
                </div>
            </div>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>© 2024 实用工具箱 - 文本对比工具</p>
            <p style="margin-top: 5px;">支持文本对比、差异高亮、错误提醒、报告导出</p>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局变量
        let diffResult = [];
        let alerts = [];
        
        // 时钟功能
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const y = now.getFullYear();
            const mo = now.getMonth() + 1;
            const d = now.getDate();
            document.getElementById('clockDate').textContent = `${y}年${mo}月${d}日 ${weekDays[now.getDay()]}`;
        }
        
        // 更新统计信息
        function updateStats(side) {
            const textarea = document.getElementById(side === 'left' ? 'textLeft' : 'textRight');
            const text = textarea.value;
            const lines = text ? text.split('\n').length : 0;
            const chars = text.length;
            
            document.getElementById(side === 'left' ? 'statsLeft' : 'statsRight').textContent = 
                `${lines} 行 | ${chars} 字符`;
        }
        
        // 上传文件
        function uploadFile(input, side) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const textarea = document.getElementById(side === 'left' ? 'textLeft' : 'textRight');
                textarea.value = e.target.result;
                updateStats(side);
                
                const timeId = side === 'left' ? 'timeLeft' : 'timeRight';
                document.getElementById(timeId).textContent = `文件: ${file.name}`;
                
                showToast(`📤 文件 "${file.name}" 已加载`);
                addAlert('success', '文件加载成功', `已成功加载文件 "${file.name}"`);
            };
            reader.readAsText(file);
            input.value = '';
        }
        
        // 粘贴文本
        async function pasteText(side) {
            try {
                const text = await navigator.clipboard.readText();
                const textarea = document.getElementById(side === 'left' ? 'textLeft' : 'textRight');
                textarea.value = text;
                updateStats(side);
                showToast('📋 已粘贴');
            } catch (err) {
                showToast('❌ 无法访问剪贴板');
            }
        }
        
        // 清空编辑器
        function clearEditor(side) {
            const textarea = document.getElementById(side === 'left' ? 'textLeft' : 'textRight');
            textarea.value = '';
            updateStats(side);
            
            const timeId = side === 'left' ? 'timeLeft' : 'timeRight';
            document.getElementById(timeId).textContent = '';
        }
        
        // 清空全部
        function clearAll() {
            clearEditor('left');
            clearEditor('right');
            diffResult = [];
            alerts = [];
            renderAlerts();
            renderDiff();
            resetStats();
            showToast('🗑️ 已清空全部');
        }
        
        // 交换文本
        function swapTexts() {
            const left = document.getElementById('textLeft');
            const right = document.getElementById('textRight');
            
            const temp = left.value;
            left.value = right.value;
            right.value = temp;
            
            updateStats('left');
            updateStats('right');
            showToast('🔄 已交换文本');
        }
        
        // 开始对比
        function compareTexts() {
            const textLeft = document.getElementById('textLeft').value;
            const textRight = document.getElementById('textRight').value;
            
            // 清空之前的提醒
            alerts = [];
            
            // 检查输入
            if (!textLeft && !textRight) {
                addAlert('warning', '请输入文本', '请在两侧输入需要对比的文本');
                renderAlerts();
                return;
            }
            
            if (!textLeft) {
                addAlert('warning', '左侧文本为空', '左侧原始文本为空，将显示右侧所有内容为新增');
            }
            
            if (!textRight) {
                addAlert('warning', '右侧文本为空', '右侧修改文本为空，将显示左侧所有内容为删除');
            }
            
            // 获取选项
            const ignoreCase = document.getElementById('ignoreCase').checked;
            const ignoreSpace = document.getElementById('ignoreSpace').checked;
            const ignoreEmptyLines = document.getElementById('ignoreEmptyLines').checked;
            const compareMode = document.getElementById('compareMode').value;
            
            // 处理文本
            let leftLines = textLeft.split('\n');
            let rightLines = textRight.split('\n');
            
            if (ignoreEmptyLines) {
                leftLines = leftLines.filter(line => line.trim() !== '');
                rightLines = rightLines.filter(line => line.trim() !== '');
            }
            
            // 执行对比
            diffResult = performDiff(leftLines, rightLines, {
                ignoreCase,
                ignoreSpace,
                compareMode
            });
            
            // 更新统计
            updateDiffStats();
            
            // 检查错误
            checkErrors(textLeft, textRight, diffResult);
            
            // 渲染结果
            renderAlerts();
            renderDiff();
            
            showToast('✅ 对比完成');
        }
        
        // 执行对比算法
        function performDiff(leftLines, rightLines, options) {
            const result = [];
            const maxLen = Math.max(leftLines.length, rightLines.length);
            
            // 简单的 LCS 算法实现
            let leftIdx = 0;
            let rightIdx = 0;
            
            while (leftIdx < leftLines.length || rightIdx < rightLines.length) {
                let leftLine = leftIdx < leftLines.length ? leftLines[leftIdx] : null;
                let rightLine = rightIdx < rightLines.length ? rightLines[rightIdx] : null;
                
                // 处理选项
                let compareLeft = leftLine;
                let compareRight = rightLine;
                
                if (options.ignoreCase) {
                    compareLeft = compareLeft ? compareLeft.toLowerCase() : null;
                    compareRight = compareRight ? compareRight.toLowerCase() : null;
                }
                
                if (options.ignoreSpace) {
                    compareLeft = compareLeft ? compareLeft.replace(/\s+/g, ' ').trim() : null;
                    compareRight = compareRight ? compareRight.replace(/\s+/g, ' ').trim() : null;
                }
                
                if (leftLine === null) {
                    // 右侧剩余行都是新增
                    result.push({
                        type: 'add',
                        leftNum: null,
                        rightNum: rightIdx + 1,
                        leftText: '',
                        rightText: rightLine
                    });
                    rightIdx++;
                } else if (rightLine === null) {
                    // 左侧剩余行都是删除
                    result.push({
                        type: 'remove',
                        leftNum: leftIdx + 1,
                        rightNum: null,
                        leftText: leftLine,
                        rightText: ''
                    });
                    leftIdx++;
                } else if (compareLeft === compareRight) {
                    // 相同
                    result.push({
                        type: 'same',
                        leftNum: leftIdx + 1,
                        rightNum: rightIdx + 1,
                        leftText: leftLine,
                        rightText: rightLine
                    });
                    leftIdx++;
                    rightIdx++;
                } else {
                    // 不同 - 检查是否是修改
                    let foundMatch = false;
                    
                    // 向后查找匹配
                    for (let i = 1; i <= 3; i++) {
                        if (leftIdx + i < leftLines.length) {
                            let nextLeft = leftLines[leftIdx + i];
                            if (options.ignoreCase) nextLeft = nextLeft.toLowerCase();
                            if (options.ignoreSpace) nextLeft = nextLeft.replace(/\s+/g, ' ').trim();
                            
                            if (nextLeft === compareRight) {
                                // 找到匹配，中间的都是删除
                                for (let j = 0; j < i; j++) {
                                    result.push({
                                        type: 'remove',
                                        leftNum: leftIdx + j + 1,
                                        rightNum: null,
                                        leftText: leftLines[leftIdx + j],
                                        rightText: ''
                                    });
                                }
                                leftIdx += i;
                                foundMatch = true;
                                break;
                            }
                        }
                        
                        if (rightIdx + i < rightLines.length) {
                            let nextRight = rightLines[rightIdx + i];
                            if (options.ignoreCase) nextRight = nextRight.toLowerCase();
                            if (options.ignoreSpace) nextRight = nextRight.replace(/\s+/g, ' ').trim();
                            
                            if (compareLeft === nextRight) {
                                // 找到匹配，中间的都是新增
                                for (let j = 0; j < i; j++) {
                                    result.push({
                                        type: 'add',
                                        leftNum: null,
                                        rightNum: rightIdx + j + 1,
                                        leftText: '',
                                        rightText: rightLines[rightIdx + j]
                                    });
                                }
                                rightIdx += i;
                                foundMatch = true;
                                break;
                            }
                        }
                    }
                    
                    if (!foundMatch) {
                        // 标记为修改
                        result.push({
                            type: 'change',
                            leftNum: leftIdx + 1,
                            rightNum: rightIdx + 1,
                            leftText: leftLine,
                            rightText: rightLine
                        });
                        leftIdx++;
                        rightIdx++;
                    }
                }
            }
            
            return result;
        }
        
        // 更新统计信息
        function updateDiffStats() {
            let same = 0, add = 0, remove = 0, change = 0;
            
            diffResult.forEach(item => {
                switch (item.type) {
                    case 'same': same++; break;
                    case 'add': add++; break;
                    case 'remove': remove++; break;
                    case 'change': change++; break;
                }
            });
            
            document.getElementById('statSame').textContent = same;
            document.getElementById('statAdd').textContent = add;
            document.getElementById('statRemove').textContent = remove;
            document.getElementById('statChange').textContent = change;
            
            // 计算相似度
            const total = diffResult.length;
            const similarity = total > 0 ? Math.round((same / total) * 100) : 100;
            document.getElementById('statSimilarity').textContent = similarity + '%';
        }
        
        // 重置统计
        function resetStats() {
            document.getElementById('statSame').textContent = '0';
            document.getElementById('statAdd').textContent = '0';
            document.getElementById('statRemove').textContent = '0';
            document.getElementById('statChange').textContent = '0';
            document.getElementById('statSimilarity').textContent = '0%';
        }
        
        // 检查错误
        function checkErrors(textLeft, textRight, diff) {
            const leftLines = textLeft.split('\n').length;
            const rightLines = textRight.split('\n').length;
            const leftChars = textLeft.length;
            const rightChars = textRight.length;
            
            // 行数差异过大
            if (Math.abs(leftLines - rightLines) > 10) {
                addAlert('error', '行数差异过大', 
                    `左侧 ${leftLines} 行，右侧 ${rightLines} 行，差异 ${Math.abs(leftLines - rightLines)} 行，请确认是否选择了正确的文件`);
            }
            
            // 字符数差异过大
            if (Math.abs(leftChars - rightChars) > 1000) {
                addAlert('error', '字符数差异过大', 
                    `左侧 ${leftChars} 字符，右侧 ${rightChars} 字符，差异 ${Math.abs(leftChars - rightChars)} 字符`);
            }
            
            // 相似度太低
            const total = diff.length;
            const same = diff.filter(d => d.type === 'same').length;
            const similarity = total > 0 ? (same / total) * 100 : 100;
            
            if (similarity < 30 && total > 0) {
                addAlert('warning', '相似度较低', 
                    `文本相似度仅为 ${Math.round(similarity)}%，请确认对比的是否为同一文档的不同版本`);
            }
            
            // 完全相同
            if (diff.every(d => d.type === 'same')) {
                addAlert('success', '文本完全相同', '两个文本内容完全一致，没有任何差异');
            }
            
            // 大量修改
            const changes = diff.filter(d => d.type === 'change').length;
            if (changes > 20) {
                addAlert('warning', '修改较多', `共有 ${changes} 处修改，建议仔细检查`);
            }
        }
        
        // 添加提醒
        function addAlert(type, title, message) {
            alerts.push({ type, title, message, id: Date.now() });
        }
        
        // 渲染提醒
        function renderAlerts() {
            const section = document.getElementById('alertSection');
            section.innerHTML = '';
            
            alerts.forEach(alert => {
                const icons = {
                    error: '❌',
                    warning: '⚠️',
                    success: '✅'
                };
                
                const div = document.createElement('div');
                div.className = `alert ${alert.type}`;
                div.innerHTML = `
                    <span class="alert-icon">${icons[alert.type]}</span>
                    <div class="alert-content">
                        <div class="alert-title">${alert.title}</div>
                        <div>${alert.message}</div>
                    </div>
                    <button class="alert-close" onclick="removeAlert(${alert.id})">✕</button>
                `;
                section.appendChild(div);
            });
        }
        
        // 移除提醒
        function removeAlert(id) {
            alerts = alerts.filter(a => a.id !== id);
            renderAlerts();
        }
        
        // 渲染对比结果
        function renderDiff() {
            const content = document.getElementById('diffContent');
            
            if (diffResult.length === 0) {
                content.innerHTML = `
                    <div class="diff-empty">
                        <div class="diff-empty-icon">📝</div>
                        <p>在两侧输入文本后点击"开始对比"</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            diffResult.forEach((item, index) => {
                const prefixes = {
                    add: '+',
                    remove: '-',
                    change: '~',
                    same: ' '
                };
                
                const lineNum = item.leftNum || item.rightNum || '';
                const displayNum = item.leftNum && item.rightNum ? 
                    `${item.leftNum}` : 
                    (item.leftNum ? `${item.leftNum}` : `  ${item.rightNum}`);
                
                let text = '';
                switch (item.type) {
                    case 'same':
                        text = escapeHtml(item.leftText);
                        break;
                    case 'add':
                        text = escapeHtml(item.rightText);
                        break;
                    case 'remove':
                        text = escapeHtml(item.leftText);
                        break;
                    case 'change':
                        text = `<span style="color: var(--diff-remove-text)">- ${escapeHtml(item.leftText)}</span><br><span style="color: var(--diff-add-text)">+ ${escapeHtml(item.rightText)}</span>`;
                        break;
                }
                
                html += `
                    <div class="diff-line ${item.type}">
                        <span class="diff-line-number">${displayNum}</span>
                        <span class="diff-line-prefix">${prefixes[item.type]}</span>
                        <span class="diff-line-text">${text}</span>
                    </div>
                `;
            });
            
            content.innerHTML = html;
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 复制差异
        function copyDiff() {
            if (diffResult.length === 0) {
                showToast('📭 没有差异可复制');
                return;
            }
            
            let text = '文本对比结果\n';
            text += '============\n\n';
            
            diffResult.forEach(item => {
                const prefixes = {
                    add: '[新增]',
                    remove: '[删除]',
                    change: '[修改]',
                    same: '[相同]'
                };
                
                const lineNum = item.leftNum ? `第${item.leftNum}行` : `第${item.rightNum}行`;
                
                if (item.type === 'change') {
                    text += `${prefixes[item.type]} ${lineNum}:\n`;
                    text += `  - ${item.leftText}\n`;
                    text += `  + ${item.rightText}\n\n`;
                } else {
                    text += `${prefixes[item.type]} ${lineNum}: ${item.leftText || item.rightText}\n`;
                }
            });
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 已复制到剪贴板');
            }).catch(() => {
                showToast('❌ 复制失败');
            });
        }
        
        // 下载报告
        function downloadReport() {
            if (diffResult.length === 0) {
                showToast('📭 没有对比结果可下载');
                return;
            }
            
            let report = '文本对比报告\n';
            report += '============\n';
            report += `生成时间: ${new Date().toLocaleString()}\n\n`;
            
            // 统计信息
            let same = 0, add = 0, remove = 0, change = 0;
            diffResult.forEach(item => {
                switch (item.type) {
                    case 'same': same++; break;
                    case 'add': add++; break;
                    case 'remove': remove++; break;
                    case 'change': change++; break;
                }
            });
            
            report += '统计信息:\n';
            report += `  相同行: ${same}\n`;
            report += `  新增行: ${add}\n`;
            report += `  删除行: ${remove}\n`;
            report += `  修改行: ${change}\n`;
            report += `  相似度: ${Math.round((same / diffResult.length) * 100)}%\n\n`;
            
            report += '详细差异:\n';
            report += '----------\n\n';
            
            diffResult.forEach(item => {
                const prefixes = {
                    add: '[+]',
                    remove: '[-]',
                    change: '[~]',
                    same: '[ ]'
                };
                
                if (item.type === 'change') {
                    report += `${prefixes[item.type]} 行 ${item.leftNum}:\n`;
                    report += `  - ${item.leftText}\n`;
                    report += `  + ${item.rightText}\n\n`;
                } else if (item.type === 'same') {
                    // 只显示前10行相同内容
                    if (same <= 10) {
                        report += `${prefixes[item.type]} 行 ${item.leftNum}: ${item.leftText}\n`;
                    }
                } else {
                    const lineNum = item.leftNum || item.rightNum;
                    report += `${prefixes[item.type]} 行 ${lineNum}: ${item.leftText || item.rightText}\n`;
                }
            });
            
            const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `text-diff-report-${new Date().toISOString().slice(0, 10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('📥 报告已下载');
        }
        
        // 显示提示消息
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 主题切换
        let isDark = true;
        
        function setTheme(light) {
            isDark = !light;
            document.documentElement.classList.toggle('light', light);
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) {
                themeBtn.textContent = light ? '☀️' : '🌙';
                themeBtn.title = light ? '切换到深色模式' : '切换到浅色模式';
            }
            localStorage.setItem('theme', light ? 'light' : 'dark');
        }
        
        function toggleTheme() {
            setTheme(isDark);
        }
        
        // 快捷键支持
        document.addEventListener('keydown', function(e) {
            // Ctrl+Enter 开始对比
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                compareTexts();
            }
            // Ctrl+Shift+T 切换主题
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'T') {
                e.preventDefault();
                toggleTheme();
            }
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateClock();
            setInterval(updateClock, 1000);
            
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') setTheme(true);
        });
    </script>
</body>
